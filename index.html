<!DOCTYPE html>
<html lang="pt-br">
<head>

    <style>
        :root {
            --primary-gradient: linear-gradient(135deg, #22d3ee, #818cf8);
            --bg-radial: radial-gradient(circle at center, #1a202c 0%, #0d1117 100%);
            --glass: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(255, 255, 255, 0.08);
            --text-main: #f8fafc;
            --text-sec: #94a3b8;
            --success: #4ade80;
            --danger: #f87171;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            font-family: 'Inter', sans-serif;
            font-weight: 300;
            background: var(--bg-radial);
            background-attachment: fixed;
            color: var(--text-main);
            display: flex;
            justify-content: center;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            width: 100%;
            max-width: 480px;
            background: var(--glass);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            border: 1px solid var(--glass-border);
            border-radius: 32px;
            padding: 35px 25px;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.4);
            height: fit-content;
        }

        .hide { display: none !important; }

        /* Animações */
        .fade-in { animation: fadeIn 0.4s ease forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        /* Stats Resumido */
        .mini-stats {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-bottom: 30px;
            font-size: 11px;
            font-weight: 600;
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        /* Botão Materias (Premium Card) */
        .card-materias {
            background: var(--primary-gradient);
            padding: 40px 25px;
            border-radius: 24px;
            text-align: center;
            cursor: pointer;
            margin-bottom: 20px;
            transition: transform 0.2s;
            box-shadow: 0 10px 25px rgba(34, 211, 238, 0.2);
        }
        .card-materias:active { transform: scale(0.97); }
        .card-materias i { font-size: 30px; display: block; margin-bottom: 10px; }

        /* Listas de Seleção */
        .list-item {
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid var(--glass-border);
            padding: 20px;
            border-radius: 18px;
            margin-bottom: 12px;
            cursor: pointer;
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: 0.2s;
        }
        .list-item:hover { background: rgba(255, 255, 255, 0.06); transform: translateX(5px); }

        /* Alternativas do Simulado */
        .opcao {
            display: flex;
            align-items: center;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid var(--glass-border);
            padding: 15px;
            border-radius: 16px;
            margin-bottom: 12px;
            cursor: pointer;
            transition: 0.2s;
        }
        .letra-circulo {
            width: 32px;
            height: 32px;
            border: 1px solid var(--glass-border);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-right: 15px;
            font-size: 12px;
            font-weight: 700;
            flex-shrink: 0;
        }
        .opcao.correta { background: var(--success) !important; color: #000; }
        .opcao.correta .letra-circulo { border-color: rgba(0,0,0,0.2); background: rgba(0,0,0,0.1); }
        .opcao.errada { background: var(--danger) !important; color: #fff; }

        /* Botões Gerais */
        .btn-action {
            width: 100%;
            padding: 18px;
            border-radius: 16px;
            border: none;
            font-weight: 700;
            cursor: pointer;
            margin-bottom: 10px;
        }
        .btn-revisao { background: none; border: 1px solid var(--danger); color: var(--danger); }
        .btn-nav { background: none; border: none; color: var(--text-sec); font-size: 13px; cursor: pointer; display: flex; align-items: center; gap: 5px; }

        .progress-bar { height: 4px; background: rgba(255, 255, 255, 0.05); border-radius: 10px; margin: 20px 0; }
        #fill { height: 100%; background: var(--primary-gradient); transition: 0.5s; width: 0%; }

</head>

let currentView = 'home';
let historyStack = ['home'];
let materiaSelecionada = "";
let capituloSelecionado = "";
let questoesQuiz = [];
let indexAtual = 0;

let errosGlobal = JSON.parse(localStorage.getItem('erros_regencia')) || [];
let historicoAcertos = JSON.parse(localStorage.getItem('acertos_total')) || 0;
let respondidasGlobal = JSON.parse(localStorage.getItem('respondidas_regencia')) || [];

window.onload = atualizarStatsHome;

function navegarPara(view, data = null) {
    document.querySelectorAll('.container > div').forEach(div => div.classList.add('hide'));
    document.getElementById(`view-${view}`).classList.remove('hide');
    currentView = view;
    historyStack.push(view);
    if(view === 'materias') renderMaterias();
    if(view === 'capitulos') renderCapitulos(data);
}

function voltar() {
    if(historyStack.length > 1) {
        historyStack.pop();
        const anterior = historyStack.pop();
        navegarPara(anterior);
    }
}

function renderMaterias() {
    const list = document.getElementById('materias-list');
    list.innerHTML = "";
    Object.keys(bancoDados).forEach(mat => {
        list.innerHTML += `
            <div class="list-item" onclick="navegarPara('capitulos', '${mat}')">
                <span>${mat}</span>
                <span>›</span>
            </div>`;
    });
}

function renderCapitulos(mat) {
    materiaSelecionada = mat;
    document.getElementById('current-materia-name').innerText = mat;
    const list = document.getElementById('capitulos-list');
    list.innerHTML = "";
    
    if(bancoDados[mat]) {
        list.innerHTML += `
            <div class="list-item" onclick="iniciarMistãoDaMateria('${mat}')" 
                 style="background: var(--primary-gradient); border:none; margin-bottom:25px;">
                <span style="font-weight:700; color:#fff;">🔥 MISTÃO: ${mat}</span>
                <span style="color:#fff;">Simular ›</span>
            </div>`;

        Object.keys(bancoDados[mat]).forEach(cap => {
            const questoesDoCap = bancoDados[mat][cap];
            const total = questoesDoCap.length;
            const feitas = questoesDoCap.filter(q => respondidasGlobal.includes(q.id)).length;
            const statusTxt = feitas === total ? "✅ Concluído" : `${feitas}/${total} questões`;

            list.innerHTML += `
                <div class="list-item" onclick="iniciarQuiz('${mat}', '${cap}')">
                    <div style="display:flex; flex-direction:column;">
                        <span style="font-size:14px; font-weight:600;">${cap}</span>
                        <span style="font-size:10px; color:var(--text-sec); margin-top:4px;">${statusTxt}</span>
                    </div>
                    <span style="color: var(--primary-gradient); font-weight: 600;">Estudar ›</span>
                </div>`;
        });
    }
}

function iniciarQuiz(mat, cap) {
    materiaSelecionada = mat;
    capituloSelecionado = cap;
    let pendentes = bancoDados[mat][cap].filter(q => !respondidasGlobal.includes(q.id));

    if (pendentes.length === 0) {
        alert("Capítulo concluído! Reiniciando rodada...");
        const idsDoCapitulo = bancoDados[mat][cap].map(q => q.id);
        respondidasGlobal = respondidasGlobal.filter(id => !idsDoCapitulo.includes(id));
        localStorage.setItem('respondidas_regencia', JSON.stringify(respondidasGlobal));
        pendentes = [...bancoDados[mat][cap]];
    }

    questoesQuiz = pendentes.sort(() => Math.random() - 0.5);
    indexAtual = 0;
    navegarPara('quiz');
    mostrarQuestao();
}

function iniciarMistãoDaMateria(mat) {
    materiaSelecionada = mat;
    let tudoDessaMateria = [];
    Object.values(bancoDados[mat]).forEach(capitulo => {
        tudoDessaMateria = tudoDessaMateria.concat(capitulo);
    });
    let pendentes = tudoDessaMateria.filter(q => !respondidasGlobal.includes(q.id));
    if(pendentes.length === 0) {
        alert("Matéria concluída! Reiniciando...");
        const idsMateria = tudoDessaMateria.map(q => q.id);
        respondidasGlobal = respondidasGlobal.filter(id => !idsMateria.includes(id));
        localStorage.setItem('respondidas_regencia', JSON.stringify(respondidasGlobal));
        pendentes = tudoDessaMateria;
    }
    questoesQuiz = pendentes.sort(() => Math.random() - 0.5);
    indexAtual = 0;
    navegarPara('quiz');
    mostrarQuestao();
}

function mostrarQuestao() {
    const q = questoesQuiz[indexAtual];
    const container = document.getElementById('opcoes-container');
    const letras = ['A', 'B', 'C', 'D', 'E'];
    document.getElementById('pergunta-texto').innerText = q.q;
    document.getElementById('quiz-status').innerText = `Questão ${indexAtual + 1}`;
    document.getElementById('fill').style.width = `${(indexAtual / questoesQuiz.length) * 100}%`;
    document.getElementById('feedback').classList.add('hide');
    container.innerHTML = "";
    q.opcoes.forEach((opt, i) => {
        container.innerHTML += `
            <div class="opcao" onclick="verificarResposta(${i})">
                <div class="letra-circulo">${letras[i]}</div>
                <span>${opt}</span>
            </div>`;
    });
}

function verificarResposta(idx) {
    const q = questoesQuiz[indexAtual];
    const opcoes = document.querySelectorAll('.opcao');
    const eCorreto = idx === q.correta;
    opcoes.forEach(o => o.style.pointerEvents = 'none');
    opcoes[idx].classList.add(eCorreto ? 'correta' : 'errada');
    opcoes[q.correta].classList.add('correta');
    if (!respondidasGlobal.includes(q.id)) {
        respondidasGlobal.push(q.id);
        localStorage.setItem('respondidas_regencia', JSON.stringify(respondidasGlobal));
    }
    if(eCorreto) {
        historicoAcertos++;
        errosGlobal = errosGlobal.filter(item => item.id !== q.id);
    } else {
        if(!errosGlobal.find(item => item.id === q.id)) errosGlobal.push(q);
    }
    localStorage.setItem('erros_regencia', JSON.stringify(errosGlobal));
    localStorage.setItem('acertos_total', JSON.stringify(historicoAcertos));
    document.getElementById('res-status').innerText = eCorreto ? "✅ ACERTOU" : "❌ ERROU";
    document.getElementById('res-status').style.color = eCorreto ? "var(--success)" : "var(--danger)";
    document.getElementById('fundamentacao').innerHTML = `${q.fund}<br><br><strong>Fonte: ${q.loc}</strong>`;
    document.getElementById('feedback').classList.remove('hide');
    atualizarStatsHome();
}

function proximaQuestao() {
    indexAtual++;
    if(indexAtual < questoesQuiz.length) mostrarQuestao();
    else { alert("Sessão finalizada!"); voltar(); }
}

function iniciarRevisaoErros() {
    if(errosGlobal.length === 0) return alert("Nenhum erro pendente!");
    questoesQuiz = [...errosGlobal].sort(() => Math.random() - 0.5);
    indexAtual = 0;
    navegarPara('quiz');
    mostrarQuestao();
}

function atualizarStatsHome() {
    document.getElementById('count-acertos').innerText = historicoAcertos;
    document.getElementById('count-erros').innerText = errosGlobal.length;
}

        .stats-summary { display: flex; gap: 12px; font-size: 0.75rem; font-weight: 700; }
        .stat-box { padding: 4px 10px; border-radius: 8px; background: #f8f8f8; }
        .stat-err { color: var(--danger); }
        .stat-acc { color: var(--success); }
        #titulo { font-family: serif; font-size: 0.95rem; line-height: 1.45; text-align: justify; padding: 15px; border-radius: 12px; border-left: 4px solid var(--primary); background: #fdfdfd; margin-bottom: 20px; }

        .option-btn:hover { border-color: var(--primary); background: #f0f7ff; }
        .letter { font-weight: 800; color: var(--primary); margin-right: 12px; }
        .correta { background: var(--success) !important; color: white !important; border: none; }
        .errada { background: var(--danger) !important; color: white !important; border: none; }
        .btn-action { background: var(--primary); color: white; border: none; border-radius: 12px; padding: 15px; font-weight: 600; width: 100%; cursor: pointer; margin-top: 10px; }
        #feedback { display: none; margin-top: 15px; padding: 15px; background: #F2F2F7; border-radius: 12px; font-size: 0.85rem; }
    </style>
</head>

let materiaAtual = "", capituloAtual = "", questaoAtual = 0, questoesFiltradas = [];
let historico = JSON.parse(localStorage.getItem('hist_regencia')) || [];
let progresso = JSON.parse(localStorage.getItem('prog_regencia')) || {};

function irParaHome() {
    document.getElementById('view-home').style.display = 'block';
    document.getElementById('view-quiz').style.display = 'none';
    document.getElementById('view-stats').style.display = 'none';
    atualizarContadores();
}

function carregarMaterias() {
    document.getElementById('view-home').style.display = 'none';
    document.getElementById('view-quiz').style.display = 'block';
    document.getElementById('titulo').innerText = "Selecione a matéria:";
    let html = "";
    Object.keys(dados).forEach(m => { html += `<button class="option-btn" onclick="carregarCapitulos('${m}')">${m}</button>`; });
    document.getElementById('conteudo').innerHTML = html;
}

function carregarCapitulos(m) {
    materiaAtual = m;
    document.getElementById('titulo').innerText = "Selecione o capítulo:";
    
    // Calcula o total real somando dinamicamente o que o navegador conseguiu ler
    let totalReal = 0;
    Object.values(dados[m]).forEach(capArray => { 
        totalReal += capArray.length; // Aqui ele conta o número real de questões [cite: 23]
    });

    let html = `<button class="option-btn" onclick="iniciarMistao()" style="background:#eef7ff; border-color: #007AFF">
                ✨ Mistão (Total: ${totalReal} questões)</button>`;
    
    Object.keys(dados[m]).forEach(c => {
        // Pega a quantidade exata de questões dentro do array do capítulo [cite: 74]
        let qtd = dados[m][c].length; 
        html += `<button class="option-btn" onclick="iniciarQuiz('${c}')">
                 ${c} <span style="margin-left:auto; color:var(--text-sec)">${qtd} questões</span>
                 </button>`;
    });
    document.getElementById('conteudo').innerHTML = html;
}

// --- FUNÇÃO MISTÃO CORRIGIDA (Lê todas as questões) ---
function iniciarMistao() {
    capituloAtual = "Mistão";
    questoesFiltradas = [];
    // Garante que percorre TODOS os capítulos da matéria [cite: 74, 115]
    Object.values(dados[materiaAtual]).forEach(capArray => {
        questoesFiltradas = questoesFiltradas.concat(capArray);
    });
    questoesFiltradas.sort(() => Math.random() - 0.5); // Embaralha
    questaoAtual = 0;
    mostrarQuestao();
}

function mostrarQuestao() {
    const q = questoesFiltradas[questaoAtual];
    document.getElementById('sub-header').innerText = `${capituloAtual} - ${questaoAtual + 1}/${questoesFiltradas.length}`;
    document.getElementById('titulo').innerText = q.q;
    document.getElementById('feedback').style.display = 'none';
    let html = "";
    q.opcoes.forEach((o, i) => {
        html += `<button class="option-btn" onclick="verificar(${i})"><span class="letter">${String.fromCharCode(65+i)}</span>${o}</button>`;
    });
    document.getElementById('conteudo').innerHTML = html;
}

function verificar(idx) {
    const q = questoesFiltradas[questaoAtual];
    const acerto = idx === q.correta;
    const btns = document.querySelectorAll('#conteudo .option-btn');
    
    btns.forEach(b => b.style.pointerEvents = 'none');
    btns[idx].classList.add(acerto ? 'correta' : 'errada');
    if(!acerto) btns[q.correta].classList.add('correta');

    historico.push({ m: materiaAtual, c: capituloAtual, correta: acerto });
    localStorage.setItem('hist_regencia', JSON.stringify(historico));
    
    atualizarContadores();

    document.getElementById('res-status').innerText = acerto ? "✅ Correto" : "❌ Incorreto";
    document.getElementById('fundamentacao').innerText = q.fund;
    document.getElementById('feedback').style.display = 'block';
}

function proximaQuestao() {
    questaoAtual++;
    if(capituloAtual !== "Mistão") {
        progresso[capituloAtual] = questaoAtual;
        localStorage.setItem('prog_regencia', JSON.stringify(progresso));
    }
    if(questaoAtual < questoesFiltradas.length) mostrarQuestao();
    else { alert("Fim do bloco!"); irParaHome(); }
}

function atualizarContadores() {
    const acertos = historico.filter(h => h.correta).length;
    document.getElementById('top-acertos').innerText = `${acertos} Acertos`;
    document.getElementById('top-erros').innerText = `${historico.length - acertos} Erros`;
}

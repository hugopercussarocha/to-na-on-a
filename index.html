<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Titanium Quiz - Master & Analytics</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --primary: #007AFF;
            --bg: #F2F2F7;
            --card-bg: #FFFFFF;
            --text-main: #1C1C1E;
            --text-sec: #8E8E93;
            --success: #34C759;
            --danger: #FF3B30;
            --warning: #FFCC00;
        }

        body { 
            font-family: -apple-system, system-ui, BlinkMacSystemFont, "Segoe UI", Roboto; 
            background-color: var(--bg);
            color: var(--text-main);
            margin: 0;
            display: flex;
            justify-content: center;
            padding: 20px;
        }

        .container { 
            width: 100%;
            max-width: 600px;
            background: var(--card-bg);
            padding: 25px;
            border-radius: 24px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
        }

        .header-nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .stats-summary {
            display: flex;
            gap: 12px;
            font-size: 0.75rem;
            font-weight: 700;
        }

        .stat-box { padding: 4px 10px; border-radius: 8px; background: #f8f8f8; }
        .stat-err { color: var(--danger); cursor: pointer; border: 1px solid #ff3b3033; }
        .stat-acc { color: var(--success); }

        #titulo { 
            font-family: "Times New Roman", Times, serif;
            font-size: 0.88rem; 
            line-height: 1.45;
            text-align: justify;
            color: #2c3e50;
            background: #fdfdfd;
            padding: 15px;
            border-radius: 12px;
            border-left: 4px solid var(--primary);
            margin-bottom: 20px;
        }

        .option-btn {
            background: #FFFFFF;
            border: 1px solid #E5E5EA;
            border-radius: 14px;
            padding: 14px 18px;
            margin-bottom: 10px;
            width: 100%;
            text-align: left;
            font-size: 0.92rem;
            cursor: pointer;
            transition: all 0.2s ease;
            display: flex;
            align-items: flex-start;
        }

        .option-btn:hover { border-color: var(--primary); background: #f0f7ff; }
        .letter { font-weight: 800; color: var(--primary); margin-right: 12px; min-width: 20px; }
        .correta { background: var(--success) !important; color: white !important; border: none; }
        .errada { background: var(--danger) !important; color: white !important; border: none; }

        .btn-action {
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 12px;
            padding: 15px;
            font-weight: 600;
            width: 100%;
            cursor: pointer;
            margin-top: 10px;
        }

        .voltar-link { color: var(--text-sec); font-size: 0.8rem; cursor: pointer; display: flex; align-items: center; gap: 5px; }

        .stats-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; margin-bottom: 20px; }
        .mini-card { background: #f8f9fa; padding: 10px; border-radius: 12px; text-align: center; }
        .mini-card small { font-size: 0.6rem; color: var(--text-sec); text-transform: uppercase; }
        .mini-card div { font-weight: 800; font-size: 1rem; color: var(--primary); }

        .chart-container { margin: 20px 0; background: #fff; border: 1px solid #eee; padding: 10px; border-radius: 15px; }
        .insight-box { background: #eef7ff; padding: 15px; border-radius: 12px; font-size: 0.8rem; border-left: 4px solid var(--primary); margin-bottom: 15px; }
        #feedback { display: none; margin-top: 15px; padding: 15px; background: #F2F2F7; border-radius: 12px; font-size: 0.82rem; text-align: justify; }
    </style>
</head>
<body>

<div class="container" id="main-container">

        <div class="stats-summary">

    </div>

        <div id="feedback">

        <button class="btn-action" onclick="irParaHome()">Voltar ao Início</button>
    </div>
</div>

                loc: "Pág. 55."
            },
            {
                id: "Q115",
                q: "Para articular 'Notas Repetidas' em dinâmica suave (Piano), Rocha sugere:",
                opcoes: [
                    "Ignorar as notas repetidas e reger apenas o início do compasso.",
                    "Usar apenas a mão esquerda com movimentos circulares.",
                    "Pedir para os músicos tocarem staccato.",
                    "Utilizar o 'ponto de impacto amortecido' ou gestos de pulso leves e elásticos.",
                    "Bater levemente com a batuta na palma da mão esquerda."
                ],
                correta: 3,
                fund: "Notas repetidas em piano exigem clareza sem dureza. O gesto deve ser leve, evitando impactos pesados.",
                loc: "Pág. 52."
         
            }
        ] // FIM DO CAPÍTULO 3
    } // FIM DA MATÉRIA
}; // Fim da variável dados

let progresso = JSON.parse(localStorage.getItem('titanium_quiz_v2')) || { respondidas: [], acertos: 0, erros: 0, listaErros: [], historico: [] };
let revisandoErros = false;
let materiaAtual, assuntoAtual, questaoIndex, listaAtual, tempoInicio;
let chartObj = null;

function irParaHome() {
    document.getElementById('view-home').style.display = "block";
    document.getElementById('view-quiz').style.display = "none";
    document.getElementById('view-stats').style.display = "none";
    document.getElementById('btnVoltar').style.visibility = "hidden";
    atualizarDashboard();
}

function carregarMaterias() {
    document.getElementById('view-home').style.display = "none";
    document.getElementById('view-quiz').style.display = "block";
    document.getElementById('btnVoltar').style.visibility = "visible";
    document.getElementById('sub-header').innerText = "";
    document.getElementById('titulo').innerText = "Selecione uma matéria:";
    document.getElementById('feedback').style.display = "none";
    let html = "";
    Object.keys(dados).forEach(m => {
        html += `<button class="option-btn" onclick="carregarCapitulos('${m}')" style="justify-content: center; font-weight: bold;">${m}</button>`;
    });
    document.getElementById('conteudo').innerHTML = html;
}

function carregarCapitulos(m) {
    materiaAtual = m;
    document.getElementById('titulo').innerText = "Escolha o Conteúdo:";
    let html = `<button class="option-btn" onclick="iniciarQuizTudo()" style="background: #eef7ff; border-color: var(--primary); font-weight: bold;">✨ Todas as Questões (Aleatório)</button>`;
    Object.keys(dados[m]).forEach(cap => {
        html += `<button class="option-btn" onclick="iniciarQuiz('${cap}')">${cap}</button>`;
    });
    document.getElementById('conteudo').innerHTML = html;
}

function iniciarQuiz(cap) {
    assuntoAtual = cap;
    revisandoErros = false;
    questaoIndex = 0;
    listaAtual = dados[materiaAtual][assuntoAtual].filter(q => !progresso.respondidas.includes(q.id));
    if(listaAtual.length === 0) { alert("Capítulo concluído!"); return irParaHome(); }
    mostrarQuestao();
}

function iniciarQuizTudo() {
    assuntoAtual = "Tudo";
    revisandoErros = false;
    questaoIndex = 0;
    
    // Junta todas as questões da matéria que ainda não foram respondidas
    let todas = [];
    Object.keys(dados[materiaAtual]).forEach(cap => {
        todas = todas.concat(dados[materiaAtual][cap]);
    });
    
    listaAtual = todas.filter(q => !progresso.respondidas.includes(q.id));
    
    // Embaralha a lista
    listaAtual.sort(() => Math.random() - 0.5);

    if(listaAtual.length === 0) { alert("Todas as questões desta matéria foram concluídas!"); return irParaHome(); }
    mostrarQuestao();
}

function mostrarQuestao() {
    const q = listaAtual[questaoIndex];
    if (!q) { alert("Fim da sessão!"); return irParaHome(); }
    tempoInicio = Date.now();
    document.getElementById('feedback').style.display = "none";
    document.getElementById('sub-header').innerText = revisandoErros ? "REVISANDO ERROS" : `${materiaAtual} • ${assuntoAtual}`;
    document.getElementById('titulo').innerText = q.q;
    let html = "";
    const letras = ["A", "B", "C", "D", "E"];
    q.opcoes.forEach((opt, i) => {
        html += `<button class="option-btn" onclick="verificar(${i})"><span class="letter">${letras[i]}</span> <span>${opt}</span></button>`;
    });
    document.getElementById('conteudo').innerHTML = html;
}

function verificar(index) {
    const q = listaAtual[questaoIndex];
    const tempoGasto = Math.round((Date.now() - tempoInicio) / 1000);
    const botoes = document.getElementById('conteudo').querySelectorAll('.option-btn');
    botoes.forEach(b => b.onclick = null);
    const correta = (index === q.correta);

    if (correta) {
        botoes[index].classList.add('correta');
        document.getElementById('res-status').innerText = "✅ ACERTOU!";
        document.getElementById('res-status').style.color = "var(--success)";
        if (revisandoErros) {
            progresso.listaErros = progresso.listaErros.filter(item => item.id !== q.id);
        } else {
            progresso.acertos++;
            progresso.respondidas.push(q.id);
        }
    } else {
        botoes[index].classList.add('errada');
        botoes[q.correta].classList.add('correta');
        document.getElementById('res-status').innerText = "❌ ERROU!";
        document.getElementById('res-status').style.color = "var(--danger)";
        if (!revisandoErros) {
            progresso.erros++;
            progresso.respondidas.push(q.id);
            progresso.listaErros.push(q);
        }
    }

    if (!revisandoErros) {
        // Encontrar a qual capítulo pertence a questão para salvar no histórico corretamente
        let capReal = assuntoAtual;
        if(assuntoAtual === "Tudo") {
            Object.keys(dados[materiaAtual]).forEach(cap => {
                if(dados[materiaAtual][cap].some(quest => quest.id === q.id)) capReal = cap;
            });
        }
        progresso.historico.push({
            materia: materiaAtual,
            assunto: capReal,
            correta: correta,
            tempo: tempoGasto,
            data: new Date().toISOString()
        });
    }

    document.getElementById('fundamentacao').innerText = q.fund;
    document.getElementById('localizacao').innerText = "Fonte: " + q.loc;
    document.getElementById('feedback').style.display = "block";
    salvarESincronizar();
}

function proximaQuestao() {
    questaoIndex++;
    mostrarQuestao();
}

function revisarErros() {
    if (progresso.listaErros.length === 0) return alert("Sem erros para revisar.");
    revisandoErros = true;
    listaAtual = [...progresso.listaErros];
    questaoIndex = 0;
    document.getElementById('view-home').style.display = "none";
    document.getElementById('view-quiz').style.display = "block";
    document.getElementById('btnVoltar').style.visibility = "visible";
    mostrarQuestao();
}

function atualizarDashboard() {
    const hist = progresso.historico;
    const total = hist.length;
    const acertos = hist.filter(h => h.correta).length;
    const perc = total > 0 ? Math.round((acertos / total) * 100) : 0;
    const tMedio = total > 0 ? Math.round(hist.reduce((acc, curr) => acc + curr.tempo, 0) / total) : 0;
    document.getElementById('dash-total').innerText = total;
    document.getElementById('dash-perc').innerText = perc + "%";
    document.getElementById('dash-tempo').innerText = tMedio + "s";
    document.getElementById('top-acertos').innerText = `${progresso.acertos} Acertos`;
    document.getElementById('top-erros').innerText = `${progresso.listaErros.length} Erros`;
    let msg = "Responda questões para ver seu diagnóstico.";
    if(total > 5) {
        if(perc >= 75) msg = "🚀 Excelente desempenho! Mantenha o ritmo.";
        else if(perc >= 50) msg = "📈 Bom caminho, mas revise os pontos vermelhos.";
        else msg = "⚠️ Atenção: Reforce a base teórica.";
    }
    document.getElementById('dash-insight').innerText = msg;
}

function verEstatisticasDetalhadas() {
    document.getElementById('view-home').style.display = "none";
    document.getElementById('view-stats').style.display = "block";
    document.getElementById('btnVoltar').style.visibility = "visible";
    const hist = progresso.historico;
    const materiasData = {};
    hist.forEach(h => {
        if(!materiasData[h.materia]) materiasData[h.materia] = { acertos: 0, total: 0 };
        materiasData[h.materia].total++;
        if(h.correta) materiasData[h.materia].acertos++;
    });
    const labels = Object.keys(materiasData);
    const scores = labels.map(l => {
        const p = (materiasData[l].acertos / materiasData[l].total) * 100;
        return p * Math.log10(materiasData[l].total + 1);
    });
    if(chartObj) chartObj.destroy();
    const ctx = document.getElementById('chartMaterias').getContext('2d');
    chartObj = new Chart(ctx, {
        type: 'bar',
        data: {
            labels: labels,
            datasets: [{ label: 'Score de Desempenho', data: scores, backgroundColor: '#007AFF', borderRadius: 8 }]
        },
        options: { indexAxis: 'y', plugins: { legend: { display: false } } }
    });
    const assuntosErros = {};
    hist.forEach(h => { if(!h.correta) assuntosErros[h.assunto] = (assuntosErros[h.assunto] || 0) + 1; });
    const ranking = Object.entries(assuntosErros).sort((a,b) => b[1] - a[1]).slice(0, 5);
    document.getElementById('lista-pontos-fracos').innerHTML = ranking.length > 0 ? 
        ranking.map(r => `<div style="padding:8px; border-bottom:1px solid #eee">❌ ${r[0]} (${r[1]} erros)</div>`).join('') : "Nenhum erro registrado ainda.";
}

function salvarESincronizar() {
    localStorage.setItem('titanium_quiz_v2', JSON.stringify(progresso));
    atualizarDashboard();
}

irParaHome();
</script>

</html>

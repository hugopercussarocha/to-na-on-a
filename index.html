let materiaAtual = "";
let capituloAtual = "";
let questoesAtuais = [];
let indiceQuestao = 0;
let erros = [];
let modoRevisao = false;

// --- FUNÇÕES DE NAVEGAÇÃO ---
function navegarPara(telaId) {
    // Esconde todas as telas
    document.querySelectorAll('.container > div').forEach(div => div.classList.add('hide'));
    // Mostra a tela desejada
    document.getElementById('view-' + telaId).classList.remove('hide');
    
    if (telaId === 'materias') renderizarMaterias();
}

function voltar() {
    if (!document.getElementById('view-quiz').classList.contains('hide')) {
        navegarPara('capitulos');
    } else if (!document.getElementById('view-capitulos').classList.contains('hide')) {
        navegarPara('materias');
    } else {
        navegarPara('home');
    }
}

// --- LÓGICA DO SIMULADOR ---
function renderizarMaterias() {
    const lista = document.getElementById('materias-list');
    lista.innerHTML = "";
    Object.keys(bancoDados).forEach(materia => {
        const div = document.createElement('div');
        div.className = 'list-item';
        div.innerHTML = `<span>${materia}</span>`;
        div.onclick = () => {
            materiaAtual = materia;
            renderizarCapitulos();
        };
        lista.appendChild(div);
    });
}

function renderizarCapitulos() {
    navegarPara('capitulos');
    const lista = document.getElementById('capitulos-list');
    lista.innerHTML = "";
    Object.keys(bancoDados[materiaAtual]).forEach(cap => {
        const div = document.createElement('div');
        div.className = 'list-item';
        div.innerHTML = `<span>${cap}</span>`;
        div.onclick = () => iniciarQuiz(cap);
        lista.appendChild(div);
    });
}

function iniciarQuiz(capitulo) {
    capituloAtual = capitulo;
    questoesAtuais = [...bancoDados[materiaAtual][capitulo]];
    indiceQuestao = 0;
    erros = [];
    modoRevisao = false;
    navegarPara('quiz');
    mostrarQuestao();
}

function mostrarQuestao() {
    const q = modoRevisao ? erros[indiceQuestao] : questoesAtuais[indiceQuestao];
    document.getElementById('quiz-title').innerText = modoRevisao ? "Revisão de Erros" : capituloAtual;
    document.getElementById('question-text').innerText = q.q;
    document.getElementById('feedback-box').classList.add('hide');
    
    const container = document.getElementById('options-container');
    container.innerHTML = "";

    q.opts.forEach((opt, index) => {
        const btn = document.createElement('button');
        btn.className = 'list-item opcao';
        btn.innerText = opt;
        btn.onclick = () => verificarResposta(index, q);
        container.appendChild(btn);
    });
}

function verificarResposta(index, questao) {
    const botoes = document.querySelectorAll('.opcao');
    const feedbackBox = document.getElementById('feedback-box');
    const feedbackText = document.getElementById('feedback-text');
    const fundamentacao = document.getElementById('fundamentacao-text');

    botoes.forEach(b => b.disabled = true);

    if (index === questao.correct) {
        botoes[index].classList.add('correta');
        feedbackText.innerText = "Correto!";
        feedbackText.style.color = "#2ecc71";
    } else {
        botoes[index].classList.add('errada');
        botoes[questao.correct].classList.add('correta');
        feedbackText.innerText = "Incorreto!";
        feedbackText.style.color = "#e74c3c";
        if (!modoRevisao) erros.push(questao);
    }

    fundamentacao.innerText = questao.fund + " (" + questao.loc + ")";
    feedbackBox.classList.remove('hide');
}

function proximaQuestao() {
    indiceQuestao++;
    const lista = modoRevisao ? erros : questoesAtuais;

    if (indiceQuestao < lista.length) {
        mostrarQuestao();
    } else {
        finalizarQuiz();
    }
}

function finalizarQuiz() {
    const container = document.getElementById('options-container');
    document.getElementById('question-text').innerText = "Simulado Finalizado!";
    document.getElementById('feedback-box').classList.add('hide');
    
    let html = `<p>Você acertou ${questoesAtuais.length - erros.length} de ${questoesAtuais.length} questões.</p>`;
    
    if (erros.length > 0) {
        html += `<button class="list-item" onclick="iniciarRevisaoErros()">Revisar Erros (${erros.length})</button>`;
    }
    
    html += `<button class="list-item" onclick="navegarPara('home')">Voltar ao Início</button>`;
    container.innerHTML = html;
}

function iniciarRevisaoErros() {
    modoRevisao = true;
    indiceQuestao = 0;
    mostrarQuestao();
}

// Inicializa o App
window.onload = () => navegarPara('home');

<html lang="pt-br">
<head>

    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#0f1115">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Regência Pro">
    <link rel="apple-touch-icon" href="icon-192.png">

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-glow: rgba(34, 211, 238, 0.4);
            --primary-gradient: linear-gradient(135deg, #22d3ee, #818cf8);
            --bg-dark: #0f1115;
            --card-bg: rgba(255, 255, 255, 0.03);
            --border-white: rgba(255, 255, 255, 0.05);
            --text-main: #f8fafc;
            --text-sec: #94a3b8;
            --success: #4ade80;
            --danger: #f87171;
            --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg-dark);
            color: var(--text-main);
            display: flex;
            justify-content: center;
            min-height: 100vh;
            padding: 20px;
        }

        /* Estilos da Tesoura e Corte */
        .btn-tesoura {
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: #94a3b8;
            width: 32px;
            height: 32px;
            border-radius: 8px;
            margin-right: 12px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            transition: var(--transition);
            flex-shrink: 0;
            z-index: 10; /* Garante que a tesoura fique sobre o clique da opção */
        }

        .btn-tesoura:hover { 
            background: rgba(255, 255, 255, 0.2); 
            color: #fff; 
        }

        /* Efeito visual de alternativa desconsiderada (Permite desfazer) */
        .opcao.cortada {
    opacity: 0.3;
    text-decoration: line-through;
    filter: grayscale(1);
    /* Removido o pointer-events para permitir clicar na tesoura de novo */
    cursor: not-allowed;
}

.opcao.cortada .btn-tesoura {
    opacity: 1;
    filter: none;
    cursor: pointer;
}

        .container {
            width: 100%;
            max-width: 480px;
            background: rgba(15, 17, 21, 0.8);
            backdrop-filter: blur(30px);
            border: 1px solid var(--border-white);
            border-radius: 32px;
            padding: 30px 20px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            height: fit-content;
        }

        .hide { display: none !important; }

        /* --- DASHBOARD --- */
        .stats-card {
            background: var(--card-bg);
            border: 1px solid var(--border-white);
            border-radius: 20px;
            padding: 15px 25px;
            display: flex;
            justify-content: space-around;
            margin-bottom: 30px;
        }
        .stat-group { display: flex; align-items: center; gap: 8px; font-size: 14px; font-weight: 600; }

        .btn-materias {
            background: var(--primary-gradient);
            padding: 35px 25px;
            border-radius: 24px;
            display: flex;
            align-items: center;
            gap: 15px;
            cursor: pointer;
            margin-bottom: 15px;
            transition: var(--transition);
            box-shadow: 0 10px 20px -5px var(--primary-glow);
            border: none; width: 100%; color: white;
        }
        .btn-materias:hover { transform: translateY(-3px); }

        .btn-revisao {
            background: var(--card-bg);
            border: 1px solid var(--border-white);
            padding: 20px; border-radius: 20px; width: 100%;
            color: var(--text-main); font-weight: 600;
            display: flex; align-items: center; justify-content: center; gap: 10px;
            cursor: pointer; transition: var(--transition);
        }

        .list-item {
            background: var(--card-bg);
            border: 1px solid var(--border-white);
            padding: 20px; border-radius: 20px; margin-bottom: 12px;
            cursor: pointer; display: flex; justify-content: space-between; align-items: center;
            transition: var(--transition);
        }
        
        .progress-mini-bg { width: 100%; height: 4px; background: rgba(255,255,255,0.05); border-radius: 10px; margin-top: 10px; overflow: hidden; }
        .progress-mini-fill { height: 100%; background: var(--primary-gradient); transition: width 0.8s ease; }

        .question-text { font-size: 1.15rem; line-height: 1.6; margin-bottom: 30px; }

        .opcao {
            display: flex; align-items: center; background: var(--card-bg);
            border: 1px solid var(--border-white); padding: 16px; border-radius: 18px;
            margin-bottom: 12px; cursor: pointer; transition: var(--transition);
        }

        .letra-circulo {
            width: 34px; height: 34px; border: 1px solid var(--border-white);
            border-radius: 50%; display: flex; align-items: center; justify-content: center;
            margin-right: 15px; font-size: 13px; font-weight: 700; flex-shrink: 0;
        }

        .texto-alternativa { flex: 1; pointer-events: none; }

       .opcao.correta {
        background: rgba(34, 197, 94, 0.2) !important;
        border-color: #22c55e !important;
        opacity: 1 !important; /* Força a volta da visibilidade */
        filter: none !important; /* Remove o efeito de cinza */
        transform: scale(1.02); /* Dá um leve destaque na resposta certa */
    }

    .opcao.correta .letra-circulo {
        background: #22c55e !important;
        color: white !important;
    }

    .opcao.errada {
        background: rgba(239, 68, 68, 0.2) !important;
        border-color: #ef4444 !important;
    }

    /* Esconde o ícone da tesoura assim que a resposta é revelada */
    .opcao.correta .btn-tesoura, 
    .opcao.errada .btn-tesoura {
        display: none;
    }

        .btn-nav { background: none; border: none; color: var(--text-sec); cursor: pointer; margin-bottom: 20px; }
    </style>
</head>

<div class="container">

</div>

        "Capítulo 4": [
            { id: "RR_C4_Q01", q: "Ao analisar a natureza do fazer musical, Ricardo Rocha estabelece uma distinção vocacional entre o ato de compor e o de interpretar. Segundo o texto, qual a relação correta entre essas instâncias?", opcoes: ["A criação e a interpretação são instâncias distintas, igualmente efetuadas por vocações específicas e independentes do nível técnico.", "A interpretação é uma extensão técnica da criação, sendo o regente um veículo passivo da vontade do compositor.", "Todo regente profissional está, por definição, apto a compor, desde que domine o arcabouço técnico da sua arte.", "A vocação da criação é superior à da interpretação, pois esta última depende exclusivamente do mercado de trabalho.", "A interpretação e a criação fundiram-se na modernidade, tornando obsoleta a distinção entre instâncias vocacionais."], correta: 0, fund: "O autor afirma que a criação e a interpretação são duas instâncias distintas, igualmente efetuadas por vocações específicas, valendo tanto para regentes quanto para instrumentistas e cantores.", loc: "Fonte: Página 74." },
            { id: "RR_C4_Q02", q: "Sobre o processo de revelação da mensagem musical, o autor descreve o papel do 'artista-intérprete'. Quais atributos são essenciais para que este agente realize a obra?", opcoes: ["O domínio absoluto da técnica de regência e o conhecimento genérico da estética de época.", "A capacidade de subordinar sua personalidade inteiramente às notas registradas na partitura original.", "O distanciamento crítico em relação à obra, garantindo uma execução puramente técnica e isenta de emoções.", "A posse de uma personalidade própria, de um olhar pessoal sobre o mundo, a vida e a obra em questão.", "A habilidade de mimetizar interpretações consagradas pela mídia e pela globalização da informação."], correta: 3, fund: "Para que a mensagem musical se realize, o texto exige um agente interpretativo possuidor de uma personalidade própria, de um olhar pessoal sobre o mundo, sobre a vida e sobre a obra.", loc: "Fonte: Página 75." },
            { id: "RR_C4_Q03", q: "Ricardo Rocha discute a eficácia do trabalho interpretativo frente às demandas de mercado. Qual a consequência para o intérprete que, embora tecnicamente preparado, carece da 'vocação da criação'?", opcoes: ["O trabalho será rejeitado pelo mercado por falta de rigor metodológico na análise formal.", "O resultado será fruto apenas da técnica, sem apresentar novidade diante do que já existe.", "A execução será marcada por um personalismo arbitrário que violenta a espontaneidade musical.", "O intérprete será incapaz de estabelecer um acordo entre intelecto, espírito e sentimento.", "A obra atingirá a maturação vegetativa de forma precoce, impedindo o florescimento do pathos."], correta: 1, fund: "O autor pondera que, sem a vocação da criação, o trabalho poderá ser até bom e bem acabado, mas terá sido sempre fruto da técnica, sem novidade diante do que já existe.", loc: "Fonte: Página 75." },
            { id: "RR_C4_Q04", q: "No tópico 'Postura diante da obra', o autor levanta uma questão central sobre os limites da interpretação. Qual o dilema enfrentado pelo intérprete consciente?", opcoes: ["A escolha entre a análise analítico-morfológica e o levantamento histórico-biográfico da peça.", "A necessidade de equilibrar a técnica de batuta com a resistência física exigida pelo gigantismo orquestral.", "A subordinação obrigatória às marcas metronômicas de compositores como Beethoven e Schumann.", "O conflito entre a utilização de instrumentos originais de época ou a modernização da paleta timbrística.", "O equilíbrio entre servir de modo estrito ao compositor ou dar vazão à sua própria personalidade."], correta: 4, fund: "O texto questiona se o intérprete deve servir de modo estrito ao compositor ou à sua própria interpretação, equilibrando limites que podem afetar a espontaneidade.", loc: "Fonte: Página 75." },
            { id: "RR_C4_Q05", q: "Sobre 'A busca de um acordo', como o autor define os critérios ideais para a escolha das obras a serem apresentadas pelo regente?", opcoes: ["Devem basear-se exclusivamente na demanda financeira e na visibilidade mediática do projeto.", "Devem seguir rigorosamente a ordem cronológica da história da música para garantir a formação do público.", "Devem ter por base a afinidade e o gosto do intérprete pelas obras escolhidas.", "Devem privilegiar peças que exijam menor tempo de ensaio para otimizar os recursos da instituição.", "Devem focar em obras de vanguarda que evitem o 'embrutecimento' do trabalho acadêmico."], correta: 2, fund: "O autor nota que, em circunstâncias ideais, o intérprete escolhe as obras baseando-se em sua afinidade e gosto pessoal, o que agrega valor à execução.", loc: "Fonte: Página 76." },
            { id: "RR_C4_Q06", q: "Qual a função do temperamento e da personalidade do intérprete no processo de tradução da obra do compositor?", opcoes: ["Agregar valor e sentido à obra executada, servindo como uma espécie de porta-voz.", "Substituir a estrutura arquitetônica da obra por improvisações estilísticas personalistas.", "Eliminar a necessidade de análise formal, uma vez que o sentimento precede o intelecto.", "Garantir que a execução seja uma cópia fiel e mecânica da intenção original do criador.", "Provocar a deformação deliberada da realidade para chocar o público e a crítica especializada."], correta: 0, fund: "O texto afirma que o temperamento e a personalidade do intérprete agregam valor e sentido à obra executada, funcionando as obras como porta-voz do músico.", loc: "Fonte: Página 76." },
            { id: "RR_C4_Q07", q: "Ao buscar um 'acordo' interpretativo, o regente deve evitar dois extremos perigosos. Segundo Rocha, agindo com equilíbrio, o regente evita:", opcoes: ["O excesso de informações biográficas e a análise morfológica excessivamente detalhada.", "A maturação lucidamente inspirada e o fenômeno artístico volátil.", "O levantamento histórico superficial e a organização estilística da mensagem.", "A correspondência do tempo interior do compositor e a aceleração dos tempos modernos.", "A mediocrização do trabalho e a entrega à tentativa fácil e equivocada do arbítrio personalista."], correta: 4, fund: "Através de um acordo que equilibre intelecto, emoção e espírito, o regente evita a mediocrização/embrutecimento e o puro arbítrio personalista.", loc: "Fonte: Página 76." },
            { id: "RR_C4_Q08", q: "O autor critica a 'abordagem da obra' na modernidade citando a globalização. Qual o principal risco apontado sobre o excesso de informações diversificadas?", opcoes: ["A impossibilidade de realizar reduções de partitura ao piano devido à falta de tempo.", "A hipertrofia de determinados recortes da realidade, levando à perda da configuração do todo.", "O desaparecimento paulatino de obras tonais em favor de repertórios contemporâneos asfixiantes.", "O aumento descontrolado do número de ensaios necessários para atingir a excelência.", "A subordinação da música erudita aos parâmetros técnicos da televisão e do cinema."], correta: 1, fund: "O autor alerta que recortes da realidade são hipertrofiados no contexto atual, fazendo com que percamos a configuração do todo em favor da parte.", loc: "Fonte: Páginas 76 e 77." },
            { id: "RR_C4_Q09", q: "Para estabelecer uma metodologia de trabalho eficiente contra a deformação da realidade, Rocha propõe que o planejamento de abordagem da obra se dê:", opcoes: ["Da parte para o todo, focando primeiro nas articulações e depois na forma.", "Do material para o espiritual, priorizando a técnica de batuta sobre o conteúdo.", "Através da audição comparativa de gravações históricas antes de abrir a partitura.", "Sempre do todo para a parte, através de instâncias técnicas e intelectuais.", "De forma linear e cronológica, partindo do primeiro ao último compasso sem interrupções."], correta: 3, fund: "O autor defende que o planejamento deve se dar sempre do todo para a parte, utilizando instâncias como levantamento histórico e análise formal.", loc: "Fonte: Página 77." },
            { id: "RR_C4_Q10", q: "No processo de abordagem, qual a importância atribuída ao 'Levantamento histórico-biográfico'?", opcoes: ["Identificar erros de grafia na partitura através do estudo dos manuscritos originais.", "Substituir a necessidade de análise harmônico-funcional por anedotas sobre o compositor.", "Revelar a chave do entendimento do caráter e do pathos do autor e da obra.", "Definir a quantidade exata de ensaios baseada na produtividade da época do compositor.", "Estabelecer as arcadas e respirações ideais para instrumentos de cordas e sopros."], correta: 2, fund: "O contexto histórico e social permite identificar o caráter e o pathos do autor, sendo a chave do entendimento para a revelação da obra.", loc: "Fonte: Página 77." },
            { id: "RR_C4_Q11", q: "A metodologia de abordagem proposta pelo autor divide-se em três pilares principais. Quais são eles?", opcoes: ["Pesquisa iconográfica, solfejo de ritmos e marcação de batuta.", "Levantamento histórico-biográfico, análise formal e organização da interpretação.", "Análise morfológica, prática de co-repetição e maturação vegetativa.", "Estudo de sintaxe, definição de andamentos e marketing cultural.", "Rastreamento de linguagem, decifração de manuscritos e ensaios de naipe."], correta: 1, fund: "O roteiro metodológico possui três momentos: 1) Histórico-biográfico; 2) Analítico-morfológico (análise formal); 3) Estilístico-interpretativo (organização da interpretação).", loc: "Fonte: Páginas 77 e 78." },
            { id: "RR_C4_Q12", q: "Durante o 'segundo momento' da abordagem (Análise Formal), o regente deve focar em qual procedimento técnico?", opcoes: ["Decidir o fraseado, as articulações e as arcadas mais importantes para o grupo.", "Pesquisar o impacto que o tempo e a sociedade tiveram sobre a vida do compositor.", "Analisar a obra das grandes estruturas para as menores, rastreando linguagem e sintaxe.", "Treinar a sequência dos gestos 'à seco' para condicionar o ouvido interno.", "Estabelecer o equilíbrio entre o 'fogo sagrado' e o distanciamento crítico no palco."], correta: 2, fund: "Na análise formal, analisa-se das grandes estruturas para as menores, buscando rastrear a linguagem e o pensamento por trás da obra.", loc: "Fonte: Página 77." },
            { id: "RR_C4_Q13", q: "Ricardo Rocha afirma que a revelação da obra depende de uma identificação profunda do intérprete. Qual elemento é considerado a 'chave' para essa revelação?", opcoes: ["A identificação do caráter e do pathos do autor.", "O domínio das técnicas de transposição e redução de partitura.", "A posse de uma autoridade institucional inquestionável frente aos músicos.", "O uso sistemático da fórmula ternária de balanço e planejamento.", "A memorização integral da obra antes do primeiro ensaio com a orquestra."], correta: 0, fund: "Na identificação do caráter e do pathos está a chave do entendimento e da revelação da obra que o intérprete precisará operar.", loc: "Fonte: Página 77." },
            { id: "RR_C4_Q14", q: "Sobre a 'Organização da Interpretação', qual tarefa cabe ao regente após concluir a análise da mensagem do texto musical?", opcoes: ["Realizar o levantamento histórico-biográfico para justificar suas escolhas pessoais.", "Delegar aos chefes de naipe a definição de dinâmicas e andamentos.", "Submeter sua personalidade ao 'fenômeno artístico' volátil e breve.", "Estabelecer dinâmicas, andamentos, articulações e soluções estilísticas.", "Iniciar imediatamente a fase de maturação vegetativa em silêncio absoluto."], correta: 3, fund: "Após o estudo do conteúdo, o intérprete deve estabelecer as dinâmicas básicas, andamentos, articulações e soluções estilísticas.", loc: "Fonte: Página 78." },
            { id: "RR_C4_Q15", q: "Caso a obra em estudo não seja tonal, como deve proceder a análise formal sugerida no texto?", opcoes: ["Deve ser abandonada em favor de uma abordagem puramente intuitiva e espiritual.", "Deve focar exclusivamente no levantamento biográfico para compensar a falta de sintaxe.", "Deve basear-se na análise harmônico-funcional tradicional do período barroco.", "Deve priorizar a organização interpretativa de arcadas e respirações externas.", "Deve ser feita a partir da localização de padrões, relações e técnicas composicionais."], correta: 4, fund: "Caso a obra não seja tonal, a análise deve ser feita pela localização de padrões, relações e técnicas composicionais utilizadas.", loc: "Fonte: Página 77." },
            { id: "RR_C4_Q16", q: "O autor diferencia a 'arte do entretenimento' do 'fenômeno artístico'. O que caracteriza essencialmente este último?", opcoes: ["A produção de bens descartáveis voltados para o consumo rápido e superficial.", "A exigência de um número reduzido de ensaios para manter o frescor da execução.", "A presença de transcendência e revelação, reordenando o meio e o universo.", "O uso intensivo de tecnologias de gravação para corrigir imperfeições técnicas.", "A subordinação do intérprete às regras ditadas pela indústria cultural globalizada."], correta: 2, fund: "O fenômeno artístico diferencia-se por ser um momento de transcendência e revelação através do qual a vida se manifesta e se reordena.", loc: "Fonte: Página 78." },
            { id: "RR_C4_Q17", q: "Qual a condição fundamental para que o processo de produção do 'fenômeno artístico' ocorra de forma orgânica e natural?", opcoes: ["A maturação da obra dentro do intérprete.", "O domínio estrito da técnica de batuta sob o aspecto físico-mecânico.", "A realização de concertos didáticos voltados para o grande público.", "A utilização de partituras manuscritas originais do século XVIII.", "O isolamento social do regente durante a fase de preparação intelectual."], correta: 0, fund: "Para que o processo se dê de forma orgânica e natural, a condição fundamental é a maturação da obra dentro do intérprete.", loc: "Fonte: Página 78." },
            { id: "RR_C4_Q18", q: "A maturação da obra exige um esforço que o autor descreve metaforicamente. Esse 'trabalho de cultivo' custará ao intérprete:", opcoes: ["O domínio das instâncias administrativas e o gerenciamento de negócios.", "O estudo exclusivo das grandes estruturas em detrimento das menores.", "A abdicação da sua personalidade própria em favor della vontade do compositor.", "Infinitas repetições seletivas do tipo ensaio-e-erro.", "A redução drástica da envergadura orquestral em movimentos de forte."], correta: 3, fund: "O cultivo da obra custará infinitas repetições seletivas do tipo ensaio-e-erro até a unificação entre intérprete, instrumento e obra.", loc: "Fonte: Página 78." },
            { id: "RR_C4_Q19", q: "O 'Mestre' ou o artista que alcançou a excelência sabe que só deve entrar no palco com a obra amadurecida. Qual estado de consciência é exigido dele nesse momento?", opcoes: ["Um transe místico que o desconecte da realidade física do pódio.", "Estado de alerta e lucidez para dominar suas emoções.", "Indiferença emocional para garantir o distanciamento crítico do público.", "Foco exclusivo na correção técnica dos músicos para evitar erros de notas.", "Um estado de sonambulismo interpretativo guiado pelo ouvido interno."], correta: 1, fund: "O artista entra no palco em estado de alerta e lucidez, com domínio de emoções, permitindo que a obra se desprenda em direção ao público.", loc: "Fonte: Página 79." },
            { id: "RR_C4_Q20", q: "O que caracteriza o momento de 'desprendimento' da obra durante uma performance de excelência?", opcoes: ["A reprodução mecânica e fiel de todos os sons registrados na partitura.", "A desconexão total entre o intérprete e a obra musical mediada pela técnica.", "O regente tornar-se refém de suas emoções, transformando-se em objeto de curiosidade.", "A entrega à inspiração momentânea sem qualquer controle consciente do tempo.", "A saída, de si próprio, do fruto amadurecido de seu trabalho no espírito."], correta: 4, fund: "O ápice é o desprendimento, a saída de si próprio do fruto amadurecido de seu trabalho no espírito, de forma lúcida.", loc: "Fonte: Página 79." },
            { id: "RR_C4_Q21", q: "Ricardo Rocha alerta para o risco de o intérprete entrar no palco com a obra 'ainda imatura'. Qual a provável consequência desse fato?", opcoes: ["O público experimentará um momento de transcendência e revelação espiritual.", "O regente alcançará a excelência técnica através do distanciamento crítico.", "As notas nascerão com calor, cor e perfumes próprios devido à espontaneidade.", "O intérprete torna-se refém de suas emoções e vira objeto de curiosidade e espetáculo.", "A música produzida terá ressonância e consonância absoluta com o pensamento do autor."], correta: 3, fund: "Se a obra for apresentada imatura, o intérprete pode tornar-se refém de suas emoções e transformar-se em objeto de curiosidade para o público.", loc: "Fonte: Página 79." },
            { id: "RR_C4_Q22", q: "A falta de conexão e o distanciamento crítico impedem a interação entre público e artista. Segundo o texto, essa falha impede o acendimento de qual elemento no palco?", opcoes: ["Do 'fogo sagrado' que caracteriza o fenômeno artístico.", "Da luz intelectual produzida pela interpretação isenta de erros.", "Do transe de visitação que arrebata os sentidos dos músicos profissionais.", "Da maturação vegetativa necessária para o reestudo da obra em casa.", "Do sistema de sinais semióticos que compõem a linguagem corporal."], correta: 0, fund: "A falta de conexão e o distanciamento crítico impedem o acendimento do fogo sagrado, essencial para o fenômeno artístico.", loc: "Fonte: Página 79." },
            { id: "RR_C4_Q23", q: "O que acontece com o trabalho de um regente cuja execução é isenta de erros em notas e andamentos, mas carece de maturação emocional e conexão?", opcoes: ["O trabalho terá calor e perfume, embora falte luz técnica.", "Produzirá um momento de arrebatamento do espírito através da lucidez.", "Terá gerado luz, mas não calor.", "Atingirá a excelência interpretativa pela perfeição material da partitura.", "Resultará no desprendimento do fruto amadurecido em direção ao público."], correta: 2, fund: "O autor pondera que uma execução isenta de erros, mas sem conexão emocional, pode ter gerado luz, mas não calor.", loc: "Fonte: Página 80." },
            { id: "RR_C4_Q24", q: "Qual a razão apontada pelo autor para que notas musicais nasçam 'mecanicamente' durante uma performance?", opcoes: ["O excesso de repetições seletivas durante a fase de cultivo interno.", "Desconexão e desatrelamento entre o intérprete e a obra musical.", "O uso de instrumentos modernos em obras do período renascentista.", "A submissão do intérprete ao fraseado do texto literário nos corais.", "A maturação vegetativa prolongada por vários anos antes da apresentação."], correta: 1, fund: "Notas que nascem mecanicamente ocorrem por desconexão e desatrelamento entre o intérprete e a obra musical.", loc: "Fonte: Página 79." },
            { id: "RR_C4_Q25", q: "No fechamento do tópico sobre maturação, o autor utiliza uma metáfora para descrever o regente que apenas reproduz o material da partitura. Esse intérprete falha por não ter tido:", opcoes: ["Técnica de batuta e vigor físico.", "Conhecimento histórico-biográfico e sintaxe.", "Luz técnica e análise morfológica.", "Estratégia de desempenho e lucidez.", "Consonância e ressonância."], correta: 4, fund: "Sem consonância o trabalho não terá ressonância, podendo gerar luz técnica, mas nunca o calor emocional necessário.", loc: "Fonte: Página 80." },
            { id: "RR_C4_Q26", q: "Ricardo Rocha postula que a música se diferencia de todas as outras artes (como as visuais e plásticas) por um fator exclusivo. Qual é ele?", opcoes: ["Trabalha exclusivamente com a categoria tempo.", "Depende do patrocínio de instituições públicas ou privadas para existir.", "Exige o domínio de instrumentos de cordas, sopro e percussão simultaneamente.", "É a única arte que não requer maturação interna por parte do criador.", "Fundamenta-se na imobilidade do tronco para garantir a expressividade gestual."], correta: 0, fund: "A música é a única arte que trabalha exclusivamente com a categoria tempo, diferenciando-se das artes ligadas ao espaço.", loc: "Fonte: Página 80." },
            { id: "RR_C4_Q27", q: "Ao tratar dos 'Caminhos da maturação', o autor faz uma ressalva importante sobre o domínio da obra. Qual a distinção feita?", opcoes: ["O domínio rítmico é superior ao domínio melódico em obras românticas.", "O domínio intelectual da obra garante automaticamente o seu domínio técnico.", "O domínio físico do regente no pódio substitui a necessidade de maturação.", "O domínio técnico de uma obra não significa obrigatoriamente seu domínio artístico.", "O domínio da partitura é uma categoria espacial, enquanto a música é temporal."], correta: 3, fund: "Rocha afirma que o domínio técnico de uma obra não significa obrigatoriamente seu domínio artístico, que depende da maturação.", loc: "Fonte: Página 80." },
            { id: "RR_C4_Q28", q: "Segundo Rocha, a fruição estética e a apreensão nas artes plásticas e visuais podem se dar no momento do contato. Na música, essa condição é diferente porque:", opcoes: ["A música exige que o público conheça a biografia do compositor previamente.", "A apreensão musical depende exclusivamente da análise harmônico-funcional.", "A música é uma arte de entretenimento voltada para o evento decorativo.", "A música não utiliza a categoria tempo para a sua manifestação artística.", "Há uma condição absoluta de exigência de consumo de tempo de nossas vidas."], correta: 4, fund: "A exigência absoluta de consumo de tempo de nossas vidas para o contato com ela diferencia a música de todas as outras artes.", loc: "Fonte: Página 80." },
            { id: "RR_C4_Q29", q: "Como o autor descreve a prática pessoal recomendada para atingir o amadurecimento interno de uma obra?", opcoes: ["Ensaiar a obra exaustivamente com a orquestra até o dia da apresentação.", "Ler livros sobre estética musical enquanto ouve diversas gravações da peça.", "Aprontar a obra tecnicamente e deixá-la em 'descanso' por algum tempo.", "Realizar infinitas repetições mecânicas sem interrupções para descanso.", "Submeter a obra à crítica de outros regentes antes de apresentá-la ao público."], correta: 2, fund: "O caminho da maturação envolve aprontar a obra tecnicamente e deixá-la em descanso (suspensa sem estudo) por semanas ou anos.", loc: "Fonte: Página 80." },
            { id: "RR_C4_Q30", q: "O processo de 'maturação vegetativa' é comparado a qual fenômeno natural no texto?", opcoes: ["Ao acendimento do fogo sagrado durante uma tempestade de verão.", "Ao desenvolvimento de frutos, que virão maiores, mais doces e exalarão aroma.", "À dilatação das cordas de um instrumento devido à pressão do arco.", "À expansão do tubo interno dos instrumentos de sopro pelo ar quente.", "Ao jogo sucessivo de tensão e distensão das forças polares do Ying-Yang."], correta: 1, fund: "Rocha utiliza a metáfora botânica: frutos que virão maiores, mais doces e exalando o aroma de sua maturidade.", loc: "Fonte: Página 81." },
            { id: "RR_C4_Q31", q: "Ricardo Rocha aconselha a estratégia da 'maturação vegetativa' para quais tipos de intérpretes?", opcoes: ["Apenas para regentes orquestrais que lidam com grandes obras sinfônicas.", "Exclusivamente para instrumentistas solistas de piano e violino.", "Para cantores líricos que precisam preservar a saúde vocal.", "Somente para estudantes de regência em fase de formação acadêmica.", "Para todo intérprete, seja regente, instrumentista ou cantor."], correta: 4, fund: "O autor aconselha o processo a todo intérprete como estratégia de desempenho, seja regente, instrumentista ou cantor.", loc: "Fonte: Página 81." },
            { id: "RR_C4_Q32", q: "Sobre o tempo necessário para a maturação dentro do intérprete, o autor afirma que:", opcoes: ["É um período fixo de nove a dez luas, idêntico ao desenvolvimento humano.", "É um tempo variável de uma pessoa para outra, inerente a cada indivíduo.", "Pode ser acelerado através de recursos químicos e treinos intensivos.", "Deve ser sempre breve para evitar que a obra se torne 'verde e sem gosto'.", "É determinado rigorosamente pelo sindicato dos músicos profissionais."], correta: 1, fund: "Cada obra tem seu tempo vegetativo de maturação, e este tempo é variável de uma pessoa para outra.", loc: "Fonte: Página 80." },
            { id: "RR_C4_Q33", q: "O que define o momento de 'resgatar' uma obra que foi deixada em descanso?", opcoes: ["A cobrança do mercado e a necessidade de cumprir contratos financeiros.", "O esquecimento total da técnica manual para permitir a reinvenção absoluta.", "A identificação de novos erros na partitura através da análise formal tardia.", "O desejo de colher um amadurecimento interno do que foi apreendido anteriormente.", "A constatação de que a obra se tornou entretenimento ou evento decorativo."], correta: 3, fund: "A obra é resgatada para colher o amadurecimento interno e vegetativo do que foi apreendido no preparo inicial.", loc: "Fonte: Página 81." },
            { id: "RR_C4_Q34", q: "Ao final do capítulo 4, Rocha conclui que a música é um 'fenômeno real'. Para o intérprete, isso significa que a maturação vegetativa é:", opcoes: ["Uma estratégia de desempenho fundamental para a excelência artística.", "Um obstáculo ao progresso técnico que deve ser evitado por profissionais.", "Um processo puramente mecânico de memorização cinestésica.", "Uma forma de desvincular o sentimento do intelecto na busca pelo acordo.", "Uma consequência inevitável do excesso de informações na globalização."], correta: 0, fund: "Com a música sendo um fenômeno real, a maturação deve ser adotada como estratégia de desempenho para melhores resultados.", loc: "Fonte: Página 81." },
            { id: "RR_C4_Q35", q: "Qual o perigo de um intérprete apressar o processo natural de maturação coletiva da obra?", opcoes: ["A música atingirá o ápice da transcendência e revelação precocemente.", "Os frutos virão com excesso de açúcar, prejudicando a estética tonal.", "O resultado será um fruto imaturo: verde e sem gosto.", "A obra perderá a sua luz técnica, mantendo apenas o calor emocional.", "O regente será incapaz de localizar padrões rítmicos em obras não tonais."], correta: 2, fund: "Acelerar o processo resulta em um fruto imaturo: verde e sem gosto, prejudicando o fenômeno artístico.", loc: "Fonte: Página 83." },
            { id: "RR_C4_Q36", q: "O autor cita que, em sua experiência, quem encontra dificuldades para interpretar a própria obra?", opcoes: ["O regente-antropólogo que foca excessivamente em questões éticas.", "O compositor, que nem sempre possui a vocação do intérprete.", "O músico de orquestra condicionado pelo entulho autoritário do século XIX.", "O público, devido à deformação da realidade causada pela televisão.", "O arquivista, ao tentar compatibilizar edições de épocas distintas."], correta: 1, fund: "A experiência do autor mostrou que quase sempre o compositor encontra reais dificuldades para interpretar a própria obra.", loc: "Fonte: Página 74." },
            { id: "RR_C4_Q37", q: "Ao discutir a separação entre criação e interpretação, Rocha cita três maestros como exemplos de exceções notáveis que dominavam ambas as vocações. Quem são eles?", opcoes: ["Bach, Beethoven e Mozart.", "Lully, Haydn e Stravinsky.", "Karajan, Toscanini e Kleiber.", "Mälzel, Weber e Schumann.", "Mahler, Strauss e Bernstein."], correta: 4, fund: "Mahler, Richard Strauss e Leonard Bernstein são citados como exceções à regra de separação entre as vocações.", loc: "Fonte: Página 75." },
            { id: "RR_C4_Q38", q: "No planejamento de abordagem, o 'Levantamento histórico-biográfico' permite ao intérprete lidar com qual aspecto da obra?", opcoes: ["O pathos e o caráter do autor.", "As arcadas e os dedilhados dos instrumentos de cordas.", "A estrutura arquitetônica analítico-morfológica.", "A correção de problemas de afinação em acordes dissonantes.", "O cronograma de ensaios e a divisão de naipes."], correta: 0, fund: "Informações históricas possibilitam a identificação do caráter e do pathos do autor, chave do entendimento da obra.", loc: "Fonte: Página 77." },
            { id: "RR_C4_Q39", q: "A análise 'harmônico-funcional' é citada no texto como parte de qual instância de trabalho?", opcoes: ["Do levantamento histórico-biográfico inicial.", "Da organização interpretativa de andamentos e dinâmicas.", "Do transe de visitação durante o concerto ao vivo.", "Da análise formal (analítico-morfológica) da obra.", "Da maturação vegetativa em períodos de descanso."], correta: 3, fund: "No segundo momento (análise formal), o intérprete segue com a análise harmônico-funcional após analisar as grandes estruturas.", loc: "Fonte: Página 77." },
            { id: "RR_C4_Q40", q: "O que o regente deve buscar para evitar o 'embrutecimento' de seu trabalho no exercício de uma simples reprodução da forma?", opcoes: ["Uma autoridade institucional baseada no rigor e na rigidez.", "A subordinação cega às instruções metronômicas de J.N. Mälzel.", "Um acordo que equilibre intelecto, emoção, espírito e sentimento.", "O uso constante de batutas pesadas para ganhar envergadura visual.", "A especialização em um único compositor para garantir a fidelidade ao texto."], correta: 2, fund: "Agindo de forma a equilibrar intelecto, emoção, espírito e sentimento, o regente evita a mediocrização e o embrutecimento.", loc: "Fonte: Página 76."
            }
        ], // ESTA VÍRGULA E COLCHETE FECHAM O CAPÍTULO 1
        
        "Capítulo 5": [
            { id: "RR_C5_Q01", q: "Ricardo Rocha estabelece uma ponte ontológica entre os capítulos 4 e 5. Segundo o autor, qual é o principal elo de ligação entre o 'cultivo' e o 'ensaio'?", opcoes: ["O tempo, que atua como matéria-prima tanto no preparo da interpretação quanto na oficina de repetição seletiva.", "A implementação tática de um plano de metas que visa substituir a maturação coletiva pela precisão mecânica.", "A autoridade institucional do mestre, que converte a categoria espaço das artes plásticas na categoria tempo da música.", "O 'fogo sagrado', que permite ao regente ignorar a oficina rítmica em favor da transcendência emocional imediata.", "O equilíbrio entre o personalismo romântico burguês e a aceleração vertiginosa imposta pelo chip e pela Internet."], correta: 0, fund: "O autor afirma que o tempo é o elo de ligação entre os dois processos: 'Trataremos este capítulo como uma continuação do Capítulo 4, uma vez que ambos abordam aspectos do cultivo musical, tendo no tempo seu principal elo de ligação.'", loc: "Fonte: Página 82." },
            { id: "RR_C5_Q02", q: "É INCORRETO afirmar, sobre a 'maturação vegetativa' aplicada à substância musical no processo de ensaio:", opcoes: ["Cada obra possui um tempo próprio e vegetativo de maturação inerente à sua própria espécie.", "A interferência acelerada no processo temporal gera deformação e ação degenerativa na obra.", "O resultado de uma maturação forçada por 'adubos técnicos' é, invariavelmente, um fruto verde e sem gosto.", "O tempo de maturação coletiva é relativo entre um intérprete e outro, anulando a ideia de tempo absoluto na Terra.", "O regente deve ter clareza sobre o 'tempo justo' ao organizar um concerto ou aceitar um convite para atuar como convidado."], correta: 3, fund: "O texto afirma o oposto sobre a relatividade: 'Caberiam aqui relembrar que esse tempo de maturação pode ser relativo entre um intérprete e outro... mas sempre será absoluto em relação ao próprio intérprete'.", loc: "Fonte: Página 83." },
            { id: "RR_C5_Q03", q: "Sobre a invenção do metrônomo por J.N. Mälzel no século XIX, o autor defende que este aparelho:", opcoes: ["Resolveu definitivamente as ambiguidades rítmicas nas sinfonias de Beethoven através da notação 'M.M.'.", "Surgiu como expressão do esforço de controle e organização dos tempi, que já estavam se alterando naquele período.", "Foi a ferramenta tecnológica que permitiu a transição estética imediata do Classicismo para o Impressionismo.", "Representa a vitória do tempo interior do compositor sobre o tempo absoluto da produção industrial em série.", "É o único recurso capaz de garantir o 'fenômeno artístico' em orquestras de eventos com poucos ensaios."], correta: 1, fund: "O autor situa a invenção historicamente: 'metrônomo, aparelho que surgiu como expressão do esforço de controle e organização dos tempi, que já estavam se alterando.'", loc: "Fonte: Página 84." },
            { id: "RR_C5_Q04", q: "É INCORRETO afirmar sobre o impacto da Revolução Industrial na percepção do tempo e das artes, segundo Ricardo Rocha:", opcoes: ["O lema nos setores produtivos passou a ser 'produzir mais, em menos tempo, pelo menor preço'.", "O Romantismo, nascido do personalismo, valorizava a personalidade do objeto em foco através de discursos prolixos.", "O Impressionismo surgiu, em parte, como uma contra-revolução desejada ao personalismo burguês.", "Houve um 'boom' dos relógios e uma explosão do consumo que serviu de combustível ao sistema de produção em série.", "A locomotiva, ao atingir a velocidade de 80 km/h, permitiu ao homem do século XIX um delineamento mais preciso das linhas da paisagem."], correta: 4, fund: "O autor diz exatamente o contrário: 'Esse novo olhar, adquirido a bordo de uma locomotiva... promovia a experiência da perda das linhas e do delineamento nas imagens da paisagem'.", loc: "Fonte: Página 84." },
            { id: "RR_C5_Q05", q: "A experiência a bordo de uma locomotiva no século XIX é usada como metáfora para explicar qual mudança estética na música?", opcoes: ["A evolução técnica das articulações de staccato e spiccato em andamentos de Presto.", "A subordinação do regente moderno aos encargos trabalhistas e prestações de serviço autônomo.", "A mudança do olhar artístico que valoriza a incidência da luz e a impressão, em detrimento da personalidade fixa do objeto.", "A necessidade de o regente operar as correspondências rítmicas do chip e da Internet nas obras corais.", "O nascimento do personalismo romântico como reação aos discursos prolixos da classe burguesa."], correta: 2, fund: "O texto conecta a velocidade à estética: 'perda das linhas e do delineamento... que ganhavam agora configuração nova sob a ação da velocidade... deu lugar ao Impressionismo, movimento que passou a valorizar não mais a personalidade do objeto em foco... mas a incidência da luz'.", loc: "Fonte: Página 84." },
            { id: "RR_C5_Q06", q: "Diante da aceleração 'vertiginosa e sufocante' do tempo contemporâneo, qual é o papel interpretativo essencial do regente?", opcoes: ["Operar internamente as correspondências do tempo interior do compositor com o tempo de hoje para fornecer uma 'ponte de acesso'.", "Adaptar o andamento original da obra para que ela mimetize a velocidade de processamento do chip e da Internet.", "Eliminar as fermatas e os rallentandi para adequar a obra aos limites estritos do mercado de consumo rápido.", "Ignorar as marcações metronômicas disparatadas de Beethoven para favorecer a maturação vegetativa do público.", "Transformar-se em um profissional do entretenimento, aceitando sua condição de peça na máquina comercial."], correta: 0, fund: "Rocha define a função do mestre: 'o intérprete contemporâneo precisa operar, dentro de si, as correspondências do tempo interior do compositor... com o tempo de hoje... capaz de fornecer-lhe a necessária ‘ponte de acesso’.'", loc: "Fonte: Página 85." },
            { id: "RR_C5_Q07", q: "É INCORRETO afirmar, sobre a realidade da quantidade de ensaios na atividade orquestral e coral contemporânea:", opcoes: ["Orquestras profissionais raramente dispõem de mais do que três, quatro ou cinco ensaios para um programa.", "Hans von Bülow gozava de um tempo de oficina que permitia ao grupo tocar sinfonias de pé e de cor.", "O regente moderno muitas vezes atua como convidado, adequando-se a formas padronizadas e consagradas de interpretação.", "A música de concerto vive uma crise existencial inserida em uma economia de mercado globalizada e de bens descartáveis.", "O coro amador, por ser composto por voluntários, exige um tempo de maturação coletiva menor que a orquestra sinfônica."], correta: 4, fund: "O autor diz o oposto: 'Se no mundo inteiro os coros são formados, em sua imensa maioria, por amadores e semiprofissionais, isso exige que os regentes contem com grande número de ensaios'.", loc: "Fonte: Página 85." },
            { id: "RR_C5_Q08", q: "Segundo Ricardo Rocha, por que a música popular contemporânea, em certos aspectos, expressa o 'fenômeno artístico' com maior legitimidade atualmente?", opcoes: ["Porque utiliza a análise analítico-morfológica para identificar padrões em obras não tonais.", "Porque as condições de mercado permitem aos seus intérpretes maior quantidade de ensaios e menor carga de estresse.", "Porque é isenta de encargos trabalhistas pesados, garantindo a sobrevivência do artista vocacionado.", "Porque substituiu o papel mítico do mestre pelo papel sóbrio do diretor de marketing cultural globalizado.", "Porque ignora o tempo interior do compositor em favor da produtividade da mercadoria rápida e barata."], correta: 1, fund: "O autor arrisca a comparação: 'hoje, é a música popular que expressa com maior legitimidade o que... chamamos de ‘fenômeno artístico’... oferece as condições que permitem aos seus intérpretes uma quantidade infinitamente maior de ensaios, assim como uma atmosfera menos carregada de estresse'.", loc: "Fonte: Página 87." },
            { id: "RR_C5_Q09", q: "Na fase de 'Preparação' do regente, a 'Abordagem' inicial da partitura deve ser feita:", opcoes: ["De forma linear, compasso a compasso, para garantir a correção técnica de notas e ritmos.", "Do material para o espírito, focando primeiramente na compatibilização das edições e arcadas.", "Através da audição de gravações consagradas para adequar-se às formas padronizadas do mercado.", "Sempre do todo para a parte, configurando a estrutura arquitetônica e o pensamento do autor através da análise.", "Delegando a análise morfológica ao arquivista para otimizar o tempo de estudo gestual 'a seco'."], correta: 3, fund: "O autor é categórico: 'convém que as obras sejam sempre estudadas do todo para a parte, através de cuidadosa análise, capaz de descobrir e configurar não apenas a estrutura arquitetônica da obra, mas de fazer entender o pensamento do compositor.'", loc: "Fonte: Página 88." },
            { id: "RR_C5_Q10", q: "Sobre o material de orquestra e coro, qual o procedimento recomendado em caso de edições diferentes entre a partitura do regente e as partes dos músicos?", opcoes: ["O regente deve exigir que a instituição adquira material novo idêntico ao seu na véspera do concerto.", "Ignorar as divergências, uma vez que músicos profissionais corrigem articulações à primeira vista.", "O regente deve ir com antecedência ao arquivo para compatibilizar sua partitura com as partes, anotando letras e compassos.", "Utilizar a fotocópia indiscriminada como recurso primário para economizar tempo de marcação manual.", "Realizar a compatibilização exclusivamente durante o intervalo do ensaio geral com o spalla e os chefes de naipe."], correta: 2, fund: "Rocha instrui: 'no caso de se tratar de edições diferentes, cabe ao regente ir com antecedência ao arquivo e compatibilizar sua partitura com as das partes, anotando as letras para ensaio, os números de compassos'.", loc: "Fonte: Página 90." },
            { id: "RR_C5_Q11", q: "No planejamento de um cronograma de ensaios sinfônicos, qual o critério logístico e estratégico defendido pelo autor?", opcoes: ["Começar pelas obras de menor envergadura orquestral para aquecer os músicos e ganhar confiança.", "Eleger as obras de maior envergadura orquestral para o início, permitindo liberar músicos que não tocam nas peças seguintes.", "Deixar as obras mais complexas rítmicamente para o final do ensaio, quando a concentração do grupo é máxima.", "Seguir rigorosamente a ordem cronológica do programa do concerto para manter a lógica estética da apresentação.", "Realizar ensaios de naipe apenas após a obra estar totalmente madura no ensaio de tutti coletivo."], correta: 1, fund: "'elegendo sempre as de maior orquestração para o início, de forma a poder liberar imediatamente os músicos que não tocam nas outras obras.'", loc: "Fonte: Página 91." },
            { id: "RR_C5_Q12", q: "É INCORRETO afirmar sobre as técnicas de preparação aplicadas a uma Orquestra Escolar, conforme o texto:", opcoes: ["Devem ser utilizadas técnicas que sirvam tanto à orquestra quanto à obra, como escalas e acordes sustentados.", "O regente pode realizar exercícios de modulações 'tom a tom', distribuindo funções harmônicas entre os grupos.", "O objetivo maior desse conjunto é a perfeição interpretativa imediata através do desprendimento lucidamente inspirado.", "Problemas de afinação em saltos melódicos difíceis devem ser resolvidos trabalhando as notas como 'notas longas', sem o ritmo.", "Escalas e acordes podem ser realizados com ou sem o uso do messa di voce (chamado metaforicamente de 'barriga barroca')."], correta: 2, fund: "O autor define o foco pedagógico: 'Sendo o objetivo maior deste tipo de orquestra a abordagem didática...'. A busca por perfeição interpretativa imediata (típica do palco profissional) não é o objetivo maior.", loc: "Fonte: Página 92." },
            { id: "RR_C5_Q13", q: "Ao tratar da execução de acordes dissonantes em uma orquestra de estudantes, o autor recomenda que sejam realizados:", opcoes: ["Senza vibrato, especialmente em notas com função de apojatura, para valorizar o efeito sonoro sem choque acústico.", "Em fortíssimo, para que o choque das frequências seja imposto pela autoridade institucional do mestre.", "Com vibrato intenso em todos os naipes, para mimetizar o 'fogo sagrado' da estética romântica tardia.", "Apenas pelas madeiras e metais, silenciando as cordas para evitar a competição sonora entre os harmônicos.", "Seguindo o temperamento igual do diapasão eletrônico, ignorando a hierarquia tonal da nota por nota."], correta: 0, fund: "Rocha explica: 'cuidando para realizar as dissonâncias senza vibrato, em particular as notas com função de apojatura. Com isso, consegue-se a valorização do efeito, sem choque e sem competição sonora.'", loc: "Fonte: Página 94." },
            { id: "RR_C5_Q14", q: "Qual é a característica fundamental da abordagem de ensaio em uma Orquestra Profissional?", opcoes: ["Deve ser linear e corretiva, focando na leitura à primeira vista de seções e recuo sistemático para notas.", "O regente deve atuar como um 'agente da opressão' para garantir o cumprimento do cronograma diante do relógio.", "A abordagem deve focar na alfabetização rítmica e na sintaxe da obra através de oficinas de leitura quinzenais.", "Deve ser fundamentalmente musical, focando em fraseado e intenções, pois as notas os músicos já resolveram sozinhos.", "Exige que o regente prepare e envie um 'kit' individual com anotações de arcadas para cada integrante do conjunto."], correta: 3, fund: "Sobre orquestras profissionais: 'O importante, neste conjunto, é que a abordagem seja fundamentalmente musical... Afinal, as notas uma orquestra pode tocar sozinha.'", loc: "Fonte: Página 96." },
            { id: "RR_C5_Q15", q: "É INCORRETO afirmar sobre a organização e técnica de ensaio para uma Orquestra de Eventos:", opcoes: ["É formada por músicos de diferentes conjuntos reunidos para um projeto com início, meio e fim definidos.", "O trabalho deve ser precedido pelo envio das partes aos integrantes em um 'kit' já com marcações e intenções.", "Os ensaios costumam ser poucos e intensos, visando o ajuste coletivo do material que o músico trouxe pronto.", "A técnica básica de ensaio é a do foco nas intenções interpretativas e na sua execução imediata.", "Deve-se utilizar a abordagem do 'todo para a parte' diluída em pelo menos dez ensaios coletivos obrigatórios."], correta: 4, fund: "O autor descreve a Orquestra de Eventos como tendo ensaios 'poucos e intensos'. Exigir dez ensaios coletivos contradiz a natureza de urgência e prontidão descrita.", loc: "Fonte: Página 97." },
            { id: "RR_C5_Q16", q: "Sobre o uso de tecnologia em Coros Amadores, Ricardo Rocha aponta que as gravações de naipes (fitas/MIDI) possuem qual desvantagem?", opcoes: ["Elas sobrecarregam o manguito rotador dos músicos acompanhantes durante a fase de gravação.", "Elas são inúteis em coros de empresas, onde a função terapêutica precede o desenvolvimento técnico.", "Elas impossibilitam o desenvolvimento musical objetivo do coro, tornando-o dependente de um recurso externo.", "Elas geram 'balanço' vocal precoce devido ao esforço de mimetizar o timbre eletrônico das gravações.", "Elas devem substituir permanentemente o uso da partitura para reduzir o estresse rítmico do grupo."], correta: 2, fund: "Rocha alerta: 'A grande desvantagem de tais meios encontra-se na impossibilidade objetiva do coro, que assim trabalha, desenvolver-se musicalmente.'", loc: "Fonte: Página 98." },
            { id: "RR_C5_Q17", q: "No trabalho com um Coro Profissional, qual o problema estilístico mais frequente citado pelo autor?", opcoes: ["O cultivo de excessivos vibratos românticos em obras de períodos anteriores (Barroco, Renascimento ou Clássico).", "A incapacidade técnica de realizar o messa di voce em passagens de legato superposto com staccato.", "A resistência dos funcionários públicos em aceitarem a autoridade pessoal do mestre baseada no carisma.", "O uso de instrumentos de afinação fixa que colidem com a emissão natural das vozes treinadas em bel canto.", "A falta de conhecimento sobre a pronúncia do latim clássico de Virgílio em obras sacras de Bach."], correta: 0, fund: "'um dos problemas típicos e comuns em coros profissionais nasce... do cultivo dos excessivos vibratos românticos... estranhos às músicas renascentista, barroca, clássica, impressionista...'.", loc: "Fonte: Página 100." },
            { id: "RR_C5_Q18", q: "O fenômeno conhecido como 'balanço' na voz de cantores veteranos em coros profissionais é definido como:", opcoes: ["Um movimento rítmico lateral do tronco que compromete a emanação de energia do centro abdominal.", "Uma técnica de respiração diafragmática que permite oscilar a afinação em intervalos de terça maior.", "Um desvio tático na implementação dos planos onde o cantor ignora as marcações de batuta.", "Um processo de envelhecimento e desgaste vocal onde a voz sai mais tremida do que exatamente vibrada.", "O equilíbrio dinâmico entre o coro e os instrumentos de sopro de metal em obras de envergadura sinfônica."], correta: 3, fund: "'processo de envelhecimento e desgaste vocal, conhecido por balanço. O cantor... sua voz passa a sair mais tremida do que exatamente vibrada.'", loc: "Fonte: Página 100." },
            { id: "RR_C5_Q19", q: "Qual é a 'questão mais relevante' para o regente de um coro profissional ao organizar o trabalho artístico?", opcoes: ["Garantir que o conjunto possua um volume sonoro capaz de superar o gigantismo da orquestra moderna.", "Fazer com que seu conjunto se apresente com a emissão adequada ao estilo, à época e à obra do compositor.", "Implementar rodízios de estantes para evitar que funcionários públicos se tornem viciados em repertório.", "Padronizar a pronúncia do latim como restaurado, independentemente da nacionalidade do autor da obra.", "Eliminar o vibrato totalmente, mesmo em obras românticas de Verdi, para manter a pureza da afinação."], correta: 1, fund: "'Enfim, a questão mais relevante para o regente de um coro profissional é fazer com que seu conjunto se apresente com a emissão adequada ao estilo, à época e à obra do compositor que está cantando'.", loc: "Fonte: Página 101." },
            { id: "RR_C5_Q20", q: "É INCORRETO afirmar, sobre a organização técnica dos ensaios em função da obra coro-orquestral:", opcoes: ["O regente pode optar por um trabalho inicialmente dividido por naipes ou famílias de instrumentos.", "No trabalho com solistas, o ideal é realizar ensaios anteriores ao piano para discutir articulações e rubatos.", "O regente preparador do coro deve saber com antecedência todas as intenções do regente que conduzirá a obra final.", "O regente deve eleger as obras de maior orquestração para o início do ensaio para liberar músicos.", "O solista possui autoridade soberana no pódio, podendo dirigir-se diretamente aos músicos para alterar dinâmicas."], correta: 4, fund: "O autor diz que essa atitude do solista é 'inaceitável': 'Tal atitude é inaceitável e, se acontecer, o regente deverá interrompê-lo... adverti-lo de que qualquer observação deverá ser dirigida ao regente'.", loc: "Fonte: Página 103." },
            { id: "RR_C5_Q21", q: "No trato com solistas 'abusados' que tentam dar ordens à orquestra durante o ensaio, Ricardo Rocha instrui o regente a:", opcoes: ["Ser servil e aceitar as instruções, uma vez que o solista é o artista principal e soberano.", "Silenciar e delegar a direção orquestral ao spalla para evitar constrangimentos de parte a parte.", "Adotar um comportamento temperamental típico do século XIX para impor respeito pelo grito.", "Interrompê-lo e adverti-lo de que qualquer observação deve ser dirigida ao regente, diretor da orquestra.", "Incentivar a interação direta entre solista e músicos como parte da mobilização construtiva do grupo."], correta: 3, fund: "'regente deverá interrompê-lo e... adverti-lo de que qualquer observação deverá ser dirigida ao regente, que é o diretor da orquestra.'", loc: "Fonte: Página 103." },
            { id: "RR_C5_Q22", q: "No que diz respeito à Pronúncia do Latim em obras corais, qual o critério defendido pelo autor para o regente decidir entre o eclesiástico ou o tradicional?", opcoes: ["Deve haver coerência com a obra e o compositor (ex: optar pelo eclesiástico se for dirigir Vivaldi).", "Deve-se utilizar sempre o latim clássico de Virgílio para garantir o rigor intelectual e acadêmico.", "A decisão deve ser delegada ao chefe do naipe de baixos para favorecer a espontaneidade rítmica.", "Deve-se adotar o latim restaurado apenas em obras profanas de compositores alemães do século XVIII.", "O latim deve ser substituído por traduções coloquiais para facilitar a comunicação com o público globalizado."], correta: 0, fund: "'deverá decidir a pronúncia que deseja, para que haja coerência com a obra e o compositor. Assim, optará, por exemplo, pelo latim eclesiástico, se for dirigir Vivaldi...'.", loc: "Fonte: Página 103." },
            { id: "RR_C5_Q23", q: "O autor define o 'Ensaio' como uma oficina que demanda tempo de elaboração. Qual destas é citada como a 'condição sine qua non' para um desempenho otimizado?", opcoes: ["O uso de batutas de cor branca ou marfim para garantir visibilidade absoluta em andamentos lentos.", "A manutenção de uma autoridade institucional rígida para combater o desânimo dos músicos mediocres.", "A boa distribuição do tempo para as obras nos ensaios, levando em conta a natureza do conjunto.", "O adestramento das inabilidades naturais dos músicos através de repetições mecânicas exaustivas.", "A presença de um estado de sonambulismo interpretativo durante a primeira leitura da partitura."], correta: 2, fund: "'E a boa distribuição do tempo para as obras nos ensaios é condição sine qua non para um desempenho otimizado do que se vai realizar.'", loc: "Fonte: Página 17 / 82." },
            { id: "RR_C5_Q24", q: "Na orquestra escolar, ao trabalhar a afinação em sequências intervalares rítmicas (ex: fusas), o regente pode:", opcoes: ["Aumentar a velocidade da passagem para que as imprecisões não sejam percebidas pelo ouvido.", "Retirar o ritmo (dobramento de notas), transformando fusas em semicolcheias ou colcheias para limpeza sonora.", "Ignorar as dissonâncias, uma vez que elas são inerentes ao processo de maturação vegetativa do estudante.", "Exigir que os alunos afinem nota por nota usando o diapasão eletrônico durante a execução da obra.", "Substituir a articulação original por um legato constante para mascarar saltos melódicos difíceis."], correta: 1, fund: "'Problemas de afinação nas seqüências intervalares... o regente... pode retirar o dobramento de notas nas seqüências, transformando fusas em semicolcheias, estas em colcheias, etc.'", loc: "Fonte: Página 93." },
            { id: "RR_C5_Q25", q: "É INCORRETO afirmar sobre a técnica de Leitura à primeira vista, segundo as sugestões do autor:", opcoes: ["Visa a desenvoltura do músico, o aumento de repertório e a experiência profissional.", "Deve estar prevista na organização do plano de ensaios de uma Orquestra Escolar de forma quinzenal ou mensal.", "A prática pode ocupar todo o tempo de um ensaio com objetivos didáticos específicos.", "A técnica de abordagem deve ser linear, com meta específica da 'costura' do esqueleto da obra.", "É uma prática facultativa para estudantes, devendo ser exigida apenas de músicos profissionais em orquestras de eventos."], correta: 4, fund: "O autor defende que a prática seja incluída no plano de ensaios da Orquestra Escolar: 'Pensamos que na organização do plano de ensaios de uma Orquestra Escolar deva estar prevista a prática...'.", loc: "Fonte: Página 95." },
            { id: "RR_C5_Q26", q: "Ricardo Rocha afirma que a regência está passando por uma 'importante fase de ajuste'. O que caracteriza essa mudança no perfil do mestre?", opcoes: ["O papel mítico e glamouroso do maestro está cedendo lugar ao sóbrio papel do diretor musical.", "A substituição da batuta por sistemas eletrônicos de marcação rítmica para evitar o entulho autoritário.", "O retorno ao modelo de regente como veículo passivo da vontade absoluta do compositor.", "A necessidade de o regente tornar-se um profissional do entretenimento para sobreviver ao mercado.", "A fusão da regência coral e orquestral em um único modelo de liderança baseado no grito."], correta: 0, fund: "'Penso que nossa profissão está passando por uma importante fase de ajuste e que o papel glamouroso e mítico do maestro... está cedendo lugar ao sóbrio papel do diretor musical.'", loc: "Fonte: Página 86." },
            { id: "RR_C5_Q27", q: "Sobre a 'Maturação Coletiva' da obra musical, Rocha argumenta que:", opcoes: ["Pode ser acelerada através do uso de gravações em MIDI e adubos técnicos de repetição seletiva.", "É um processo puramente espacial que depende exclusivamente da envergadura gestual do condutor.", "Acelerar o processo coletivo produz resultados tecnicamente perfeitos, embora falte o 'fogo sagrado'.", "Cada obra exige um tempo justo de oficina musical, sem o qual o fenômeno artístico não se manifesta.", "O regente convidado possui maior facilidade de maturação por não pertencer a um único conjunto fixo."], correta: 3, fund: "'Ensaio demanda tempo – e tempo justo: nem mais, nem menos do que o necessário, condição que o regente deverá ter sempre clara na cabeça'. Sem esse tempo justo, não ocorre a maturação coletiva.", loc: "Fonte: Página 83 e 85." },
            { id: "RR_C5_Q28", q: "É INCORRETO afirmar sobre as 'Soluções Gestuais' na fase de preparação do ensaio:", opcoes: ["O regente deve escolher gestos que solucionem trechos tecnicamente complexos, como mudanças de compasso.", "Devem ser incluídas marcações para hemíolas, mudanças súbitas de dinâmica e entradas de fermatas.", "O regente deve estudar 'a seco', treinando a sequência apenas a partir do seu ouvido interno.", "A sequência gestual deve ser repetida até ser condicionada pelo mestre antes do contato com o grupo.", "Tais soluções devem ser comunicadas verbalmente aos músicos antes de qualquer tentativa de gesto no pódio."], correta: 4, fund: "O autor descreve o estudo gestual como uma preparação interna e individual do regente: 'estudar ‘a seco’, ou seja, treinar a seqüência dos gestos... só a partir do ouvido interno...'. Não há instrução para verbalizar tudo antes.", loc: "Fonte: Página 89." },
            { id: "RR_C5_Q29", q: "Ao analisar a crise existencial da música de concerto, Rocha cita o desaparecimento de quais agentes fundamentais?", opcoes: ["Artistas que dominam as técnicas de transposição e redução de partitura ao piano.", "Músicos profissionais que aceitam as relações trabalhistas formais com pesados encargos.", "Artistas vocacionados e firmes diante da ditadura do mercado e da indústria implacável de consumo.", "Regentes que utilizam instrumentos originais em obras do período clássico vianense.", "Funcionários públicos que se dedicam ao cultivo musical de nosso povo em coros de empresas."], correta: 2, fund: "'o que constatamos é o desaparecimento paulatino dos artistas vocacionados e firmes diante da ditadura do mercado e dessa indústria implacável de consumo.'", loc: "Fonte: Página 87." },
            { id: "RR_C5_Q30", q: "No contexto da discussão sobre o 'tempo absoluto' na Terra, o autor utiliza o exemplo do grão de arroz para provar que:", opcoes: ["A alimentação adequada do regente interfere diretamente na sua resistência física e no manguito rotador.", "Interferências aceleradoras no tempo natural de desenvolvimento provocam deformação e ação degenerativa.", "O ensaio de orquestra deve ser dividido em pequenas porções granulares de tempo para ser eficiente.", "A técnica é o único meio pelo qual obtemos o máximo rendimento temporal com o mínimo esforço.", "O regente deve conhecer a cultura agrária do compositor para entender o seu tempo interior."], correta: 1, fund: "'um grão de arroz... terá sempre a duração específica de sua espécie... se houver interferência, decerto ocorrerão deformação e ação degenerativa.'", loc: "Fonte: Página 83." },
            { id: "RR_C5_Q31", q: "No Exemplo 1 (Orquestra Escolar), o autor sugere que o exercício 'tom a tom' serve para:", opcoes: ["Decorar a sequência de notas das sinfonias de Mahler e Strauss sem o uso da partitura.", "Substituir a necessidade de leitura rítmica por um aprendizado puramente auditivo e vocal.", "Treinar a agilidade dos dedos em andamentos de Presto através da repetição mecânica.", "Evitar o uso de vibrato em notas com função de apojatura em acordes dissonantes.", "Oferecer uma excelente oficina de afinação com diversas possibilidades de variações rítmicas e dinâmicas."], correta: 4, fund: "'o seguinte exercício tom a tom... tem se mostrado uma excelente oficina de afinação. Ele dá ao regente diversas possibilidades de variações rítmicas e dinâmicas'.", loc: "Fonte: Página 92." },
            { id: "RR_C5_Q32", q: "Sobre o trabalho de naipes ou famílias de instrumentos em obras orquestrais complexas, Rocha recomenda:", opcoes: ["Que seja feito simultaneamente para todos os instrumentos para economizar tempo de pódio.", "Que o regente divida o grupo se a obra exigir, avisando os músicos com antecedência no quadro de avisos.", "Que o regente permaneça sentado e delegue a condução rítmica ao spalla e aos chefes de naipe.", "Que apenas as cordas realizem ensaios separados, enquanto as madeiras e metais ensaiam sempre em tutti.", "Que os ensaios de naipe ocorram obrigatoriamente após o ensaio geral para corrigir erros de afinação."], correta: 1, fund: "'o regente poderá dividir a orquestra em naipes ou famílias... avisados com antecedência.'", loc: "Fonte: Páginas 90 e 101." },
            { id: "RR_C5_Q33", q: "Qual destas práticas é classificada como ilegal pelo autor no gerenciamento do material de orquestra?", opcoes: ["Usar edições urtext em vez de edições práticas revisadas por regentes famosos do século XIX.", "Utilizar partes manuscritas por estudantes em vez de material impresso industrialmente.", "Realizar anotações de arcadas, dinâmicas e articulações nas partes originais do arquivo.", "Fotocopiar material de orquestra, na maior parte dos casos, para substituir partes em mau estado.", "Mudar a tonalidade de uma obra coral para adequá-la à tessitura de um coro amador."], correta: 3, fund: "'poder-se-á fotocopiá-lo [o material] — porém, tal iniciativa, na maior parte dos casos, é ilegal.'", loc: "Fonte: Página 90." },
            { id: "RR_C5_Q34", q: "No trato com solistas, Ricardo Rocha adverte que um regente 'servil' e sem consciência de sua posição:", opcoes: ["Não será respeitado por seus músicos.", "Alcançará maior sucesso comercial nas agências de concertos internacionais globalizadas.", "Facilitará o processo de maturação vegetativa da obra através da submissão passiva.", "Deve focar exclusivamente na técnica de batuta e ignorar as interações rítmicas do palco.", "É o perfil ideal para dirigir orquestras de eventos que possuem pouca preparação individual."], correta: 0, fund: "'Um regente servil, sem consciência de sua posição e autoridade, não será respeitado por seus músicos.'", loc: "Fonte: Página 103." },
            { id: "RR_C5_Q35", q: "É INCORRETO afirmar sobre a 'Abordagem Linear' recomendada para orquestras escolares:", opcoes: ["Consiste em realizar a leitura de seções da obra e retornar imediatamente para as correções.", "Avança-se por leitura e recuo até cobrir toda a peça, finalizando com um grande da capo.", "Deve ser substituída pela abordagem 'do todo para a parte' em todos os ensaios da orquestra de estudantes.", "Exige que o regente tenha o 'esqueleto' e a estrutura de todo o programa claros na cabeça.", "É adequada para músicos em treinamento que necessitam de metas específicas de 'costura' rítmica."], correta: 2, fund: "O autor diz que para a escola, a linear é melhor: 'Pensamos que o ensaio numa orquestra escolar deva ser feito a partir de uma abordagem linear (e não do todo para a parte)'.", loc: "Fonte: Página 95." },
            { id: "RR_C5_Q36", q: "Sobre a 'Oficina de Leitura' no coro amador, o autor sugere que o regente deve:", opcoes: ["Cobrar o domínio absoluto da partitura antes de aceitar o cantor no ensaio coletivo.", "Criar possibilidades de aprendizado musical abrindo espaço dentro do tempo de ensaio.", "Substituir o ensaio da obra por aulas de solfejo e teoria musical acadêmica exaustiva.", "Utilizar exclusivamente o método puramente auditivo para evitar o afastamento dos voluntários.", "Exigir que todos os cantores amadores comprem teclados eletrônicos para estudo domiciliar."], correta: 1, fund: "'importa que cada regente pense em criar possibilidades de aprendizado musical, abrindo espaço dentro do tempo de seu ensaio... para uma oficina de leitura rítmica e melódica.'", loc: "Fonte: Página 98." },
            { id: "RR_C5_Q37", q: "No trabalho com Coro Convidado, se o regente da obra sinfônica não for o mesmo que preparou o coro, ele deve:", opcoes: ["Delegar as intenções interpretativas à vontade soberana do regente preparador.", "Não se preocupar com as intenções rítmicas e dinâmicas até o momento do ensaio geral.", "Realizar todos os ensaios de coro acompanhado pela orquestra completa desde a primeira leitura.", "Ignorar as rimas do texto literário e focar apenas na precisão métrica do metrônomo de Mälzel.", "Tentar conseguir ao menos dois ensaios em separado com o coro antes do encontro com a orquestra."], correta: 4, fund: "'poderá... enviar suas intenções ao coro com antecedência, tentando... conseguir ao menos dois ensaios em separado com este, antes de seu encontro com a orquestra.'", loc: "Fonte: Página 103." },
            { id: "RR_C5_Q38", q: "O autor afirma que a música é a única arte que trabalha exclusivamente com a categoria tempo. Isso implica que:", opcoes: ["O contato com ela exige uma condição absoluta de consumo de tempo de nossas vidas.", "O domínio técnico de uma obra garante automaticamente o seu domínio artístico e interpretativo.", "As artes plásticas possuem maior relevância social por ocuparem a categoria espacial e o pódio.", "O tempo do ensaio deve ser o mais curto possível para valorizar o evento decorativo e comercial.", "O regente deve ignorar o relógio e ensaiar até que o grupo atinja o transe de visitação espiritual."], correta: 0, fund: "'Esta condição absoluta de exigência de consumo do tempo de nossas vidas para o contato com ela, faz com que a música se diferencie de todas as outras artes'.", loc: "Fonte: Páginas 80 / 82." },
            { id: "RR_C5_Q39", q: "No Exemplo 4 (Coro Amador), Rocha observa que, no Brasil, a atividade coral:", opcoes: ["É restrita aos grandes centros urbanos do Rio de Janeiro e de Minas Gerais.", "Carece de tradição nas regiões Sul e Sudeste, dependendo de subsídios de empresas.", "É financiada integralmente por sindicatos de funcionários públicos e associações de classe.", "É uma das mais importantes forças na formação e no cultivo musical de nosso povo.", "Depende exclusivamente do uso de computadores e programas de partitura como Encore ou Finale."], correta: 3, fund: "'No Brasil, a atividade coral é uma das mais importantes forças na formação e no cultivo musical de nosso povo.'", loc: "Fonte: Página 97." },
            { id: "RR_C5_Q40", q: "Finalizando o capítulo 5, o autor destaca que a regência é uma arte complexa em decadência para muitos, mas que o verdadeiro artista musical:", opcoes: ["Deve aceitar o seu papel de profissional do entretenimento decorativo globalizado.", "Precisa ser substituído por regentes tiranos e arrogantes para restaurar a disciplina.", "Poderá voltar a ocupar o papel de herói no universo das representações humanas se mantiver sua vocação e firmeza.", "Deve focar na produção de mercadorias rápidas e baratas para aceitar sua máquina comercial.", "Alcançará a excelência apenas se reger sinfonias de pé e de cor sem a necessidade de ensaios."], correta: 2, fund: "'mantida a tendência internacional... o verdadeiro artista musical poderá voltar a ocupar o papel de herói no universo das representações humanas...'.", loc: "Fonte: Página 87." },
            { id: "RR_C5_Q41", q: "Na 'Abordagem da obra', o primeiro passo é o levantamento histórico-biográfico. Qual a finalidade técnica desse procedimento?", opcoes: ["Revelar o caráter e o pathos do autor e da obra, servindo como chave de entendimento da mensagem.", "Identificar o número exato de ensaios realizados na estreia mundial da peça para mimetizar o tempo.", "Substituir a análise harmônico-funcional por anedotas motivacionais para quebrar o estresse do grupo.", "Definir a cor da batuta e o tipo de smoking que o regente utilizará no pódio em função da época.", "Justificar o uso de instrumentos eletrônicos em obras do período romântico para acelerar a maturação."], correta: 0, fund: "'Tais informações... possibilitarão a identificação do caráter e do pathos do autor... Nessa identificação poderá estar a chave do entendimento'.", loc: "Fonte: Páginas 77 / 88." },
            { id: "RR_C5_Q42", q: "É INCORRETO afirmar sobre a 'Análise Formal' (segundo momento da abordagem):", opcoes: ["Deve-se partir sempre das grandes estruturas para as menores.", "Visa rastrear e descobrir a linguagem e a sintaxe da obra estudada.", "Caso a obra não seja tonal, a análise deve localizar padrões, relações e técnicas composicionais.", "Deve ser feita simultaneamente à organização da interpretação durante o primeiro ensaio coletivo.", "Busca entender o pensamento que está por trás das notas musicais e das grandes estruturas."], correta: 3, fund: "O autor descreve esses passos como momentos distintos e prévios ao ensaio coletivo. Fazer isso durante o ensaio contradiz a metodologia.", loc: "Fonte: Páginas 77 / 88." },
            { id: "RR_C5_Q43", q: "Sobre o estado de consciência do regente no palco, o autor cita que o artista excelente entra:", opcoes: ["Em estado de sonambulismo interpretativo guiado apenas pelo 'fogo sagrado' e pelo subconsciente.", "Em estado de alerta e lucidez, com pleno domínio de suas emoções, para que a obra se 'desprenda'.", "Refém de suas próprias emoções para que o público o veja como um objeto de curiosidade e espetáculo.", "Sem ter amadurecido a obra vegetativamente, para garantir o frescor e a surpresa da improvisação.", "Com distanciamento crítico total, tratando a música como mera reprodução de material sonoro."], correta: 1, fund: "'Somente assim, em estado de alerta e lucidez, é que o artista com domínio de suas emoções... cria as condições para que a obra... dele se ‘desprenda’'.", loc: "Fonte: Página 79." },
            { id: "RR_C5_Q44", q: "É INCORRETO afirmar sobre o momento do 'desprendimento' da obra durante a performance:", opcoes: ["É a saída, de si próprio, do fruto amadurecido de seu trabalho no espírito.", "O artista sabe exatamente o que está acontecendo e simplesmente deixa ocorrer.", "Ocorre quando as notas nascem com calor, cor e perfumes próprios (unificação intérprete-obra).", "É impossibilitado pela falta de conexão e pelo distanciamento crítico excessivo do mestre.", "É uma técnica puramente tática que pode ser ensinada em oficinas de regência escolar em 24 horas."], correta: 4, fund: "O autor descreve este processo como 'misterioso e rigorosamente espiritual' e fruto de 'infinitas repetições seletivas'. Não é algo tático de rápida aprendizagem.", loc: "Fonte: Páginas 78 / 79." },
